<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Sight-Reading Trainer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: #333;
        }

        .score-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
            font-size: 1.2rem;
            color: #555;
        }

        .score-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .score-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #2196F3;
        }

        .staff-container {
            background: white;
            border: 2px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            margin: 30px 0;
            min-height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        #staffCanvas {
            max-width: 100%;
            width: 600px;
            height: 200px;
            display: block;
            background: white;
        }

        .controls {
            margin: 30px 0;
        }

        .btn {
            padding: 12px 30px;
            font-size: 1.1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #2196F3;
            color: white;
            font-weight: bold;
            transition: all 0.2s;
            margin: 0 10px 10px 10px;
        }

        .btn:hover {
            background: #1976D2;
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .note-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 30px;
        }

        .note-btn {
            padding: 20px 30px;
            font-size: 1.5rem;
            font-weight: bold;
            border: 3px solid #2196F3;
            border-radius: 12px;
            background: white;
            color: #2196F3;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 80px;
        }

        .note-btn:hover {
            background: #E3F2FD;
            transform: scale(1.05);
        }

        .note-btn:active {
            transform: scale(0.95);
        }

        .note-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .flash-green {
            animation: flashGreen 0.3s ease-in-out;
        }

        .flash-red {
            animation: flashRed 0.3s ease-in-out;
        }

        @keyframes flashGreen {
            0% { background-color: white; }
            50% { background-color: #4CAF50; }
            100% { background-color: white; }
        }

        @keyframes flashRed {
            0% { background-color: white; }
            50% { background-color: #F44336; }
            100% { background-color: white; }
        }

        #loadingMsg {
            color: #999;
            font-size: 1rem;
        }

        #errorMsg {
            color: red;
            padding: 10px;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2rem;
            }

            .score-container {
                font-size: 1rem;
                gap: 20px;
            }

            .score-value {
                font-size: 1.5rem;
            }

            .note-btn {
                padding: 15px 20px;
                font-size: 1.3rem;
                min-width: 70px;
            }

            .btn {
                padding: 10px 20px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Music Sight-Reading Trainer</h1>
        
        <div class="score-container">
            <div class="score-item">
                <span>Score</span>
                <span class="score-value" id="currentScore">0</span>
            </div>
            <div class="score-item">
                <span>Best</span>
                <span class="score-value" id="bestScore">0</span>
            </div>
        </div>

        <div class="controls">
            <button class="btn" id="startBtn">Start</button>
            <button class="btn" id="restartBtn" disabled>Restart</button>
        </div>

        <div class="staff-container" id="staffContainer">
            <div id="staffDiv"></div>
            <div id="loadingMsg">Loading...</div>
            <div id="errorMsg" style="display: none;"></div>
        </div>

        <div class="note-buttons" id="noteButtons">
            <button class="note-btn" data-note="C" disabled>C</button>
            <button class="note-btn" data-note="D" disabled>D</button>
            <button class="note-btn" data-note="E" disabled>E</button>
            <button class="note-btn" data-note="F" disabled>F</button>
            <button class="note-btn" data-note="G" disabled>G</button>
            <button class="note-btn" data-note="A" disabled>A</button>
            <button class="note-btn" data-note="B" disabled>B</button>
        </div>
    </div>

    <!-- 1. Tone.js 로드 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

    <!-- 2. 악보 렌더링 (VexFlow) -->
    <script src="staff.js"></script>

    <!-- 3. 게임 로직 -->
    <script>
        // ===== 상태 변수 =====
        let synth = null;
        let currentNote = null;
        let score = 0;
        let gameActive = false;
        let audioUnlocked = false;

        // 음표별 주파수
        const noteFrequencies = {
            'C4': 261.63, 'D4': 293.66, 'E4': 329.63, 'F4': 349.23,
            'G4': 392.00, 'A4': 440.00, 'B4': 493.88,
            'C5': 523.25, 'D5': 587.33, 'E5': 659.25, 'F5': 698.46,
            'G5': 783.99, 'A5': 880.00, 'B5': 987.77
        };

        // ===== 오디오 =====
        let pianoReady = false;

        function initAudio() {
            try {
                // Salamander Grand Piano 샘플
                // 키 이름에 #을 사용 (Tone.js 표준)
                // 파일명은 s로 표기 (Ds4.mp3 = D#4)
                synth = new Tone.Sampler({
                    urls: {
                        'A3':  'A3.mp3',
                        'C4':  'C4.mp3',
                        'D#4': 'Ds4.mp3',
                        'F#4': 'Fs4.mp3',
                        'A4':  'A4.mp3',
                        'C5':  'C5.mp3',
                        'D#5': 'Ds5.mp3',
                        'F#5': 'Fs5.mp3',
                        'A5':  'A5.mp3',
                        'C6':  'C6.mp3'
                    },
                    baseUrl: 'https://tonejs.github.io/audio/salamander/',
                    release: 1.5,
                    onload: () => {
                        pianoReady = true;
                        console.log('🎹 피아노 샘플 로드 완료');
                    },
                    onerror: (err) => {
                        console.error('피아노 샘플 로드 에러:', err);
                        createFallbackSynth();
                    }
                }).toDestination();

                // 10초 안에 로드 안 되면 폴백
                setTimeout(() => {
                    if (!pianoReady) {
                        console.warn('피아노 샘플 로드 타임아웃, 폴백 사용');
                        createFallbackSynth();
                    }
                }, 10000);

            } catch (e) {
                console.error('Sampler 생성 실패:', e);
                createFallbackSynth();
            }
        }

        function createFallbackSynth() {
            if (pianoReady) return;
            synth = new Tone.PolySynth(Tone.Synth, {
                volume: -6,
                oscillator: { type: 'fatsine', count: 3, spread: 20 },
                envelope: {
                    attack: 0.005,
                    decay: 0.8,
                    sustain: 0.1,
                    release: 1.5
                }
            }).toDestination();
            pianoReady = true;
        }

        function unlockAudio() {
            if (!audioUnlocked) {
                Tone.start();
                audioUnlocked = true;
            }
        }

        function playNote(noteName) {
            if (!synth || !audioUnlocked || !pianoReady) return;
            try {
                synth.triggerAttackRelease(noteName, '4n');
            } catch (e) {
                // 주파수로 폴백
                const freq = noteFrequencies[noteName];
                if (freq) {
                    synth.triggerAttackRelease(freq, '4n');
                }
            }
        }

        // ===== 게임 로직 =====
        function getRandomNote() {
            const notes = Object.keys(noteFrequencies);
            return notes[Math.floor(Math.random() * notes.length)];
        }

        function updateScore() {
            document.getElementById('currentScore').textContent = score;
            const bestScore = parseInt(localStorage.getItem('bestScore') || '0');
            if (score > bestScore) {
                localStorage.setItem('bestScore', score.toString());
                document.getElementById('bestScore').textContent = score;
            } else {
                document.getElementById('bestScore').textContent = bestScore;
            }
        }

        function showNextNote() {
            if (!gameActive) return;
            currentNote = getRandomNote();
            renderStaff(currentNote);

            setTimeout(() => {
                if (gameActive && audioUnlocked) {
                    playNote(currentNote);
                }
            }, 100);
        }

        function checkAnswer(selectedNote) {
            if (!gameActive || !currentNote) return;

            const currentOctave = parseInt(currentNote.replace(/[^0-9]/g, '')) || 4;
            const correctNote = currentNote.replace(/[0-9]/g, '').toUpperCase().trim();
            const userNote = selectedNote.toUpperCase().trim();
            const isCorrect = userNote === correctNote;

            // 선택한 음표를 같은 옥타브로 재생
            const noteToPlay = userNote + currentOctave;
            playNote(noteToPlay);

            const container = document.getElementById('staffContainer');

            if (isCorrect) {
                score++;
                updateScore();
                container.classList.remove('flash-red');
                container.classList.add('flash-green');
                setTimeout(() => container.classList.remove('flash-green'), 300);
            } else {
                container.classList.remove('flash-green');
                container.classList.add('flash-red');
                setTimeout(() => container.classList.remove('flash-red'), 300);
            }

            setTimeout(() => {
                if (gameActive) showNextNote();
            }, 400);
        }

        function startGame() {
            gameActive = true;
            score = 0;
            updateScore();
            document.getElementById('startBtn').disabled = true;
            document.getElementById('restartBtn').disabled = false;
            document.querySelectorAll('.note-btn').forEach(btn => btn.disabled = false);
            showNextNote();
        }

        function restartGame() {
            gameActive = false;
            score = 0;
            updateScore();
            document.getElementById('startBtn').disabled = false;
            document.getElementById('restartBtn').disabled = true;
            document.querySelectorAll('.note-btn').forEach(btn => btn.disabled = true);
            initStaff();
        }

        // ===== 이벤트 리스너 =====
        document.getElementById('startBtn').addEventListener('click', () => {
            unlockAudio();
            startGame();
        });

        document.getElementById('restartBtn').addEventListener('click', restartGame);

        document.querySelectorAll('.note-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                if (!gameActive) return;
                unlockAudio();
                checkAnswer(btn.getAttribute('data-note'));
            });
        });

        document.addEventListener('click', unlockAudio, { once: true });

        window.addEventListener('resize', () => {
            if (!gameActive) initStaff();
        });

        // ===== 초기화 =====
        function initializePage() {
            initAudio();
            updateScore();
            const bestScore = parseInt(localStorage.getItem('bestScore') || '0');
            if (bestScore > 0) {
                document.getElementById('bestScore').textContent = bestScore;
            }
            // staff.js의 initStaff 호출
            initStaff();
            document.getElementById('loadingMsg').style.display = 'none';
        }

        // VexFlow 동적 로딩 (여러 CDN 시도)
        const vexFlowCDNs = [
            'https://cdn.jsdelivr.net/npm/vexflow@4.2.6/build/cjs/vexflow.js',
            'https://unpkg.com/vexflow@4.2.6/build/cjs/vexflow.js',
            'https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js',
            'https://cdn.jsdelivr.net/npm/vexflow@3.0.9/releases/vexflow-min.js',
            'https://unpkg.com/vexflow@3.0.9/releases/vexflow-min.js'
        ];

        function loadVexFlowFromCDN(index) {
            if (index >= vexFlowCDNs.length) {
                document.getElementById('loadingMsg').style.display = 'none';
                document.getElementById('errorMsg').style.display = 'block';
                document.getElementById('errorMsg').textContent = 'VexFlow 라이브러리를 로드할 수 없습니다. 인터넷 연결을 확인 후 새로고침하세요.';
                return;
            }

            const script = document.createElement('script');
            script.src = vexFlowCDNs[index];
            script.onload = function() {
                console.log('VexFlow 로드 성공:', vexFlowCDNs[index]);
                // VexFlow 4.x는 전역변수 VexFlow 사용
                if (typeof VexFlow !== 'undefined' && typeof Vex === 'undefined') {
                    window.Vex = { Flow: VexFlow };
                }
                initializePage();
            };
            script.onerror = function() {
                console.warn('VexFlow 로드 실패:', vexFlowCDNs[index]);
                loadVexFlowFromCDN(index + 1);
            };
            document.body.appendChild(script);
        }

        loadVexFlowFromCDN(0);
    </script>
</body>
</html>
