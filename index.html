<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Sight-Reading Trainer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            height: 100dvh;
            padding: 6px;
            overflow: hidden;
        }

        /* ===== 전체 레이아웃: 게임(왼쪽) + 스코어보드(오른쪽) ===== */
        .page-wrapper {
            display: flex;
            gap: 8px;
            max-width: 1200px;
            margin: 0 auto;
            height: 100%;
            overflow: hidden;
        }

        /* 게임 영역 */
        .game-area {
            flex: 1;
            min-width: 0;
            background: white;
            border-radius: 16px;
            padding: 6px 10px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            text-align: center;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            gap: 2px;
        }

        /* 스코어보드 */
        .scoreboard {
            width: 240px;
            flex-shrink: 0;
            background: white;
            border-radius: 16px;
            padding: 15px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            overflow-y: auto;
        }

        /* ===== 툴바 행 ===== */
        .toolbar-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 4px 0;
            flex-wrap: wrap;
            flex-shrink: 0;
        }

        .toolbar-group {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .toolbar-sep {
            width: 1px;
            height: 20px;
            background: #ddd;
            flex-shrink: 0;
        }

        /* ===== 언어 선택 ===== */
        .lang-select {
            padding: 2px 4px;
            font-size: 0.78rem;
            font-weight: bold;
            border: 1.5px solid #ccc;
            border-radius: 6px;
            background: white;
            cursor: pointer;
            color: #555;
        }

        .lang-select:focus {
            border-color: #FF9800;
            outline: none;
        }

        /* ===== 사용자 선택 (compact) ===== */
        .user-section label {
            font-weight: bold;
            color: #555;
            font-size: 0.85rem;
        }

        #userSelect {
            padding: 2px 6px;
            font-size: 0.8rem;
            border: 1.5px solid #ddd;
            border-radius: 6px;
            background: white;
            min-width: 80px;
            cursor: pointer;
        }

        #userSelect:focus {
            border-color: #2196F3;
            outline: none;
        }

        .user-add-btn {
            padding: 2px 7px;
            font-size: 0.8rem;
            border: 1.5px solid #4CAF50;
            border-radius: 6px;
            background: #4CAF50;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            line-height: 1;
        }

        .user-add-btn:hover {
            background: #388E3C;
        }

        .user-del-btn {
            padding: 2px 6px;
            font-size: 0.8rem;
            border: 1.5px solid #F44336;
            border-radius: 6px;
            background: white;
            color: #F44336;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            line-height: 1;
        }

        .user-del-btn:hover {
            background: #F44336;
            color: white;
        }

        /* ===== 점수 (inline) ===== */
        .score-container {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.8rem;
            color: #555;
        }

        .score-item {
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .score-label {
            font-size: 0.75rem;
            color: #888;
        }

        .score-value {
            font-size: 0.95rem;
            font-weight: bold;
            color: #2196F3;
        }

        .score-value.multiplier {
            color: #FF9800;
        }

        .score-value.multiplier.high {
            color: #F44336;
        }

        .staff-container {
            background: white;
            border: 2px solid #ddd;
            border-radius: 8px;
            padding: 2px;
            margin: 2px auto;
            flex: 1 1 0;
            min-height: 0;
            max-width: 770px;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        #staffDiv {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #staffDiv svg {
            max-width: 100%;
            max-height: 100%;
        }

        #staffCanvas {
            max-width: 100%;
            width: 420px;
            height: 180px;
            display: block;
            background: white;
        }

        /* ===== 버튼 (compact) ===== */
        .btn {
            padding: 4px 12px;
            font-size: 0.8rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: #2196F3;
            color: white;
            font-weight: bold;
            transition: all 0.2s;
        }

        .btn:hover {
            filter: brightness(0.9);
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .btn-stop { background: #F44336; }
        .btn-stop:disabled { background: #ccc; }
        .btn-restart { background: #2196F3; }

        /* 자리표 선택 */
        .clef-btn {
            padding: 3px 10px;
            font-size: 0.78rem;
            font-weight: bold;
            border: 1.5px solid #ccc;
            border-radius: 14px;
            background: white;
            color: #777;
            cursor: pointer;
            transition: all 0.2s;
        }

        .clef-btn:hover {
            border-color: #9C27B0;
            color: #9C27B0;
        }

        .clef-btn.active {
            background: #9C27B0;
            border-color: #9C27B0;
            color: white;
        }

        .clef-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 난이도 선택 */
        .diff-btn {
            padding: 3px 10px;
            font-size: 0.78rem;
            font-weight: bold;
            border: 1.5px solid #ccc;
            border-radius: 14px;
            background: white;
            color: #777;
            cursor: pointer;
            transition: all 0.2s;
        }

        .diff-btn:hover {
            border-color: #2196F3;
            color: #2196F3;
        }

        .diff-btn.active {
            background: #2196F3;
            border-color: #2196F3;
            color: white;
        }

        .diff-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 옥타브 선택 (inline) */
        .octave-group {
            gap: 4px;
        }

        .octave-btn {
            width: 24px;
            height: 24px;
            border: 1.5px solid #ccc;
            border-radius: 50%;
            background: white;
            color: #555;
            font-size: 0.75rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            padding: 0;
        }

        .octave-btn:hover:not(:disabled) {
            border-color: #FF9800;
            color: #FF9800;
            background: #FFF8E1;
        }

        .octave-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .octave-display {
            font-size: 0.78rem;
            font-weight: bold;
            color: #555;
            min-width: 70px;
            text-align: center;
        }

        .piano-container {
            margin-top: 2px;
            display: flex;
            justify-content: center;
            flex-shrink: 0;
            overflow-x: auto;
            flex-shrink: 0;
        }

        .piano {
            display: flex;
            position: relative;
            height: 160px;
            user-select: none;
        }

        .white-key-wrapper {
            position: relative;
            width: 52px;
            height: 160px;
        }

        /* Middle C 표시 */
        .piano-key.middle-c {
            color: #B71C1C;
            font-size: 1.5rem;
            text-shadow: 0 0 2px rgba(183, 28, 28, 0.3);
        }

        .piano-key {
            position: relative;
            width: 52px;
            height: 160px;
            background: linear-gradient(to bottom, #f8f8f8, #fff 10%, #fff 85%, #e0e0e0);
            border: 1px solid #999;
            border-radius: 0 0 6px 6px;
            cursor: pointer;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #555;
            transition: all 0.08s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15), inset 0 -2px 3px rgba(0,0,0,0.05);
            z-index: 1;
            margin-left: -1px;
        }

        .white-key-wrapper:first-child .piano-key {
            margin-left: 0;
        }

        .piano-key:hover {
            background: linear-gradient(to bottom, #eef5ff, #e3f0ff 10%, #e3f0ff 85%, #d0e4ff);
        }

        .piano-key:active,
        .piano-key.key-pressed {
            background: linear-gradient(to bottom, #ddd, #eee);
            box-shadow: 0 1px 2px rgba(0,0,0,0.2), inset 0 -1px 1px rgba(0,0,0,0.05);
            transform: translateY(2px);
            height: 158px;
        }

        .piano-key:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: linear-gradient(to bottom, #eee, #e5e5e5);
        }

        .piano-key:disabled:hover {
            background: linear-gradient(to bottom, #eee, #e5e5e5);
        }

        .piano-key:disabled:active {
            transform: none;
            height: 160px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15), inset 0 -2px 3px rgba(0,0,0,0.05);
        }

        .piano-key.key-correct {
            background: linear-gradient(to bottom, #66BB6A, #43A047 10%, #388E3C 85%, #2E7D32) !important;
            color: white !important;
            border-color: #2E7D32;
        }

        .piano-key.key-wrong {
            background: linear-gradient(to bottom, #EF5350, #F44336 10%, #E53935 85%, #D32F2F) !important;
            color: white !important;
            border-color: #D32F2F;
        }

        .piano-key.key-show-answer {
            box-shadow: 0 0 0 4px #333, 0 4px 8px rgba(0,0,0,0.15) !important;
            color: #333 !important;
            font-size: 1.5rem !important;
            border-color: #333 !important;
        }

        .black-key {
            position: absolute;
            top: 0;
            right: -17px;
            width: 32px;
            height: 100px;
            background: linear-gradient(to bottom, #333, #1a1a1a 40%, #111 90%, #000);
            border: 1px solid #000;
            border-radius: 0 0 4px 4px;
            z-index: 2;
            box-shadow: 0 4px 6px rgba(0,0,0,0.4), inset 0 -2px 4px rgba(255,255,255,0.05);
            pointer-events: none;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 6px;
            font-size: 0.7rem;
            font-weight: bold;
            color: transparent;
            cursor: default;
        }

        .black-key.active-black {
            pointer-events: auto;
            cursor: pointer;
            color: #ccc;
        }

        .black-key.active-black:hover {
            background: linear-gradient(to bottom, #555, #333 40%, #222 90%, #111);
        }

        .black-key.active-black:active {
            background: linear-gradient(to bottom, #444, #222);
            box-shadow: 0 1px 2px rgba(0,0,0,0.3);
            transform: translateY(2px);
            height: 98px;
        }

        .black-key.active-black:disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .black-key.key-correct {
            background: linear-gradient(to bottom, #66BB6A, #43A047 40%, #388E3C 90%, #2E7D32) !important;
            color: white !important;
        }

        .black-key.key-wrong {
            background: linear-gradient(to bottom, #EF5350, #F44336 40%, #E53935 90%, #D32F2F) !important;
            color: white !important;
        }

        .black-key.key-show-answer {
            box-shadow: 0 0 0 3px #333, 0 4px 6px rgba(0,0,0,0.4) !important;
            color: #fff !important;
            background: #555 !important;
        }

        /* ===== 컴팩트 키보드 (중급/고급) ===== */
        .piano.compact { height: 140px; }
        .piano.compact .white-key-wrapper { width: 34px; height: 140px; }
        .piano.compact .piano-key {
            width: 34px; height: 140px;
            font-size: 0.75rem; padding-bottom: 8px;
        }
        .piano.compact .piano-key:active,
        .piano.compact .piano-key.key-pressed { height: 138px; }
        .piano.compact .black-key {
            width: 22px; height: 84px; right: -11px; font-size: 0.5rem;
        }
        .piano.compact .black-key.active-black:active { height: 82px; }

        .flash-green { animation: flashGreen 0.3s ease-in-out; }
        .flash-red { animation: flashRed 0.3s ease-in-out; }

        @keyframes flashGreen {
            0% { background-color: white; }
            50% { background-color: #4CAF50; }
            100% { background-color: white; }
        }
        @keyframes flashRed {
            0% { background-color: white; }
            50% { background-color: #F44336; }
            100% { background-color: white; }
        }

        #loadingMsg { color: #999; font-size: 1rem; }
        #errorMsg { color: red; padding: 10px; }

        .timer-warning {
            color: #F44336 !important;
            animation: pulse 0.5s ease-in-out infinite alternate;
        }

        @keyframes pulse {
            from { opacity: 1; }
            to { opacity: 0.4; }
        }

        /* ===== 게임 종료 오버레이 ===== */
        .game-over-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .game-over-box {
            background: white;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 90%;
        }

        .game-over-box h2 { font-size: 2rem; color: #333; margin-bottom: 20px; }
        .game-over-box .final-score { font-size: 3rem; font-weight: bold; color: #2196F3; margin: 15px 0; }
        .game-over-box .new-best { color: #4CAF50; font-weight: bold; font-size: 1.2rem; margin-bottom: 15px; }
        .game-over-box .btn { margin-top: 20px; }

        /* ===== 스코어보드 ===== */
        .scoreboard h2 {
            font-size: 1.3rem;
            color: #333;
            margin-bottom: 15px;
            text-align: center;
            padding-bottom: 10px;
            border-bottom: 2px solid #eee;
        }

        .sb-diff-section {
            margin-bottom: 16px;
        }

        .sb-diff-title {
            font-size: 0.85rem;
            font-weight: bold;
            color: white;
            padding: 5px 12px;
            border-radius: 12px;
            display: inline-block;
            margin-bottom: 8px;
        }

        .sb-diff-title.beginner { background: #4CAF50; }
        .sb-diff-title.intermediate { background: #FF9800; }
        .sb-diff-title.advanced { background: #F44336; }

        .sb-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        .sb-table th {
            text-align: left;
            padding: 4px 8px;
            color: #999;
            font-size: 0.8rem;
            border-bottom: 1px solid #eee;
        }

        .sb-table td {
            padding: 5px 8px;
            border-bottom: 1px solid #f5f5f5;
        }

        .sb-table td:last-child {
            text-align: right;
            font-weight: bold;
            color: #2196F3;
        }

        .sb-table tr.current-user td {
            background: #E3F2FD;
            font-weight: bold;
        }

        .sb-table tr.current-user td:first-child::before {
            content: '▸ ';
            color: #2196F3;
        }

        .sb-no-scores {
            color: #ccc;
            font-size: 0.85rem;
            text-align: center;
            padding: 8px;
        }

        .sb-toggle-btn {
            display: none;
            background: none;
            border: none;
            font-size: 0.9rem;
            cursor: pointer;
            color: #999;
            margin-left: 6px;
            vertical-align: middle;
        }

        @media (max-width: 900px) {
            .sb-toggle-btn { display: inline-block; }
            .scoreboard.collapsed #scoreboardContent { display: none; }
            .scoreboard.collapsed { max-height: none; overflow: visible; }
        }

        /* ===== 반응형 ===== */

        /* 태블릿 (세로) / 작은 노트북 */
        @media (max-width: 900px) {
            .page-wrapper {
                flex-direction: column;
            }

            .scoreboard {
                width: 100%;
                order: 2;
                max-height: 30vh;
                overflow-y: auto;
            }

            .game-area {
                order: 1;
                flex: 1;
                min-height: 0;
            }
        }

        /* 높이가 작은 화면 (노트북 등) */
        @media (max-height: 750px) {
            body { padding: 4px; }
            .toolbar-row { padding: 2px 0; gap: 6px; }
            .octave-btn { width: 22px; height: 22px; font-size: 0.7rem; }
            .octave-display { font-size: 0.72rem; min-width: 60px; }
            .score-value { font-size: 0.85rem; }
            .score-label { font-size: 0.7rem; }
            .clef-btn { padding: 2px 8px; font-size: 0.72rem; }
            .diff-btn { padding: 2px 8px; font-size: 0.72rem; }
            .btn { padding: 3px 10px; font-size: 0.75rem; }
            .staff-container { margin: 1px auto; padding: 2px; }
            .piano-container { margin-top: 2px; }
            .piano { height: 120px; }
            .white-key-wrapper { width: 42px; height: 120px; }
            .piano-key { width: 42px; height: 120px; font-size: 0.9rem; padding-bottom: 6px; }
            .piano-key:active, .piano-key.key-pressed { height: 118px; }
            .piano-key:disabled:active { height: 120px; }
            .black-key { width: 26px; height: 72px; right: -14px; font-size: 0.6rem; padding-bottom: 4px; }
            .black-key.active-black:active { height: 70px; }
            .piano.compact { height: 110px; }
            .piano.compact .white-key-wrapper { width: 28px; height: 110px; }
            .piano.compact .piano-key { width: 28px; height: 110px; font-size: 0.65rem; padding-bottom: 4px; }
            .piano.compact .piano-key:active, .piano.compact .piano-key.key-pressed { height: 108px; }
            .piano.compact .black-key { width: 18px; height: 66px; right: -9px; font-size: 0.45rem; }
            .piano.compact .black-key.active-black:active { height: 64px; }
            .game-area { padding: 4px 8px; }
        }

        /* 모바일 세로 */
        @media (max-width: 600px) {
            body { padding: 3px; }
            .toolbar-row { padding: 2px 0; gap: 4px; }
            .toolbar-sep { height: 16px; }
            .score-label { font-size: 0.65rem; }
            .score-value { font-size: 0.8rem; }
            .user-add-btn, .user-del-btn { padding: 2px 5px; font-size: 0.7rem; }
            #userSelect { min-width: 60px; font-size: 0.75rem; padding: 2px 4px; }
            .clef-btn { padding: 2px 7px; font-size: 0.7rem; }
            .diff-btn { padding: 2px 7px; font-size: 0.7rem; }
            .btn { padding: 3px 8px; font-size: 0.75rem; }
            .staff-container { margin: 1px auto; padding: 2px; }
            .piano-container { margin-top: 2px; }
            .piano { height: 130px; }
            .white-key-wrapper { width: 42px; height: 130px; }
            .piano-key { width: 42px; height: 130px; font-size: 0.95rem; padding-bottom: 8px; }
            .piano-key:active, .piano-key.key-pressed { height: 128px; }
            .piano-key:disabled:active { height: 130px; }
            .black-key { width: 26px; height: 78px; right: -14px; font-size: 0.6rem; }
            .black-key.active-black:active { height: 76px; }
            .piano.compact .white-key-wrapper { width: 24px; height: 120px; }
            .piano.compact .piano-key { width: 24px; height: 120px; font-size: 0.55rem; padding-bottom: 4px; }
            .piano.compact .piano-key:active, .piano.compact .piano-key.key-pressed { height: 118px; }
            .piano.compact .black-key { width: 16px; height: 72px; right: -8px; font-size: 0.4rem; }
            .piano.compact .black-key.active-black:active { height: 70px; }
            .game-area { padding: 4px 6px; }
            .scoreboard { padding: 10px; }
            .scoreboard h2 { font-size: 1rem; margin-bottom: 8px; }
        }

        /* 아주 작은 모바일 */
        @media (max-width: 380px) {
            .toolbar-row { gap: 3px; }
            .toolbar-sep { display: none; }
            .piano { height: 110px; }
            .white-key-wrapper { width: 36px; height: 110px; }
            .piano-key { width: 36px; height: 110px; font-size: 0.8rem; padding-bottom: 6px; }
            .piano-key:active, .piano-key.key-pressed { height: 108px; }
            .piano-key:disabled:active { height: 110px; }
            .black-key { width: 22px; height: 66px; right: -12px; font-size: 0.5rem; }
            .piano.compact .white-key-wrapper { width: 20px; height: 100px; }
            .piano.compact .piano-key { width: 20px; height: 100px; font-size: 0.5rem; padding-bottom: 3px; }
            .piano.compact .piano-key:active, .piano.compact .piano-key.key-pressed { height: 98px; }
            .piano.compact .black-key { width: 13px; height: 60px; right: -7px; font-size: 0.35rem; }
        }

        /* 가로모드 모바일/태블릿 */
        @media (max-height: 500px) {

        // 전체 음표 주파수 (옥타브 1~6)
        const noteFrequencies = {

            'C#6': 1108.73, 'D#6': 1244.51, 'F#6': 1479.98, 'G#6': 1661.22, 'A#6': 1864.66,
            'Db6': 1108.73, 'Eb6': 1244.51, 'Gb6': 1479.98, 'Ab6': 1661.22, 'Bb6': 1864.66
        };

        // ===== 옥타브 오프셋 =====
        let octaveOffset = 0; // -1, 0, +1

        // 기본 시작 옥타브 (자리표별, 초/중급)
        // 높은음자리표: 기본 C4, 낮은음자리표: 기본 C3
        function getBaseOctaves(clef, difficulty) {
            if (difficulty === 'advanced') return null; // 고급은 별도 처리
            if (clef === 'treble') return [4];
            return [3];
        }

        // 고급 범위: F3~E5 (offset 적용)
        const ADV_BASE_LOW = 'F';  // 시작 음
        const ADV_BASE_LOW_OCT = 3;
        const ADV_BASE_HIGH = 'E'; // 끝 음
        const ADV_BASE_HIGH_OCT = 5;

        // 고급 범위의 모든 자연음 (F~E 순서)
        const advancedNaturalOrder = ['F', 'G', 'A', 'B', 'C', 'D', 'E'];
        // 고급 범위의 샵 (F부터 E까지 사이)
        const advancedSharpOrder = ['F#', 'G#', 'A#', 'C#', 'D#'];
        const advancedFlatOrder = ['Gb', 'Ab', 'Bb', 'Db', 'Eb'];

        function generateAdvancedNotePool(offset) {
            const lowOct = ADV_BASE_LOW_OCT + offset;
            const highOct = ADV_BASE_HIGH_OCT + offset;
            const pool = [];
            // F(lowOct) ~ B(lowOct)
            ['F','G','A','B'].forEach(n => {
                pool.push(n + lowOct);
                // 샵/플랫
                if (['F','G','A'].includes(n)) {
                    pool.push(n + '#' + lowOct);
                    const flatMap = {'F':'Gb','G':'Ab','A':'Bb'};
                    pool.push(flatMap[n] + lowOct);
                }
            });
            // C(lowOct+1) ~ B(lowOct+1) (full middle octave)
            const midOct = lowOct + 1;
            ['C','D','E','F','G','A','B'].forEach(n => {
                pool.push(n + midOct);
            });
            ['C#','D#','F#','G#','A#'].forEach(s => pool.push(s + midOct));
            ['Db','Eb','Gb','Ab','Bb'].forEach(f => pool.push(f + midOct));
            // C(highOct) ~ E(highOct)
            ['C','D','E'].forEach(n => {
                pool.push(n + highOct);
            });
            ['C#','D#'].forEach(s => pool.push(s + highOct));
            ['Db','Eb'].forEach(f => pool.push(f + highOct));
            return pool;
        }

        function generateAdvancedWhiteKeys(offset) {
            const lowOct = ADV_BASE_LOW_OCT + offset;
            const highOct = ADV_BASE_HIGH_OCT + offset;
            const midOct = lowOct + 1;
            const keys = [];
            ['F','G','A','B'].forEach(n => keys.push(n + lowOct));
            ['C','D','E','F','G','A','B'].forEach(n => keys.push(n + midOct));
            ['C','D','E'].forEach(n => keys.push(n + highOct));
            return keys;
        }

        // 동적 음표 풀 생성
        function generateNotePool(clef, difficulty, offset) {
            if (difficulty === 'advanced') {
                return generateAdvancedNotePool(offset);
            }
            const baseOcts = getBaseOctaves(clef, difficulty);
            const octaves = baseOcts.map(o => o + offset);
            const naturals = ['C', 'D', 'E', 'F', 'G', 'A', 'B'];
            const sharps = ['C#', 'D#', 'F#', 'G#', 'A#'];
            const flats = ['Db', 'Eb', 'Gb', 'Ab', 'Bb'];

            const pool = [];
            octaves.forEach(oct => {
                naturals.forEach(n => pool.push(n + oct));
                if (difficulty !== 'beginner') {
                    sharps.forEach(s => pool.push(s + oct));
                    flats.forEach(f => pool.push(f + oct));
                }
            });
            return pool;
        }

        // 동적 건반 설정 생성
        function generateKeyboardConfig(clef, difficulty, offset) {
            if (difficulty === 'advanced') {
                return {
                    whiteKeys: generateAdvancedWhiteKeys(offset),
                    showBlack: true,
                    compact: true
                };
            }
            const baseOcts = getBaseOctaves(clef, difficulty);
            const octaves = baseOcts.map(o => o + offset);
            const naturals = ['C', 'D', 'E', 'F', 'G', 'A', 'B'];
            const whiteKeys = [];
            octaves.forEach(oct => {
                naturals.forEach(n => whiteKeys.push(n + oct));
            });
            return { whiteKeys, showBlack: true, compact: false };
        }

        // 옥타브 범위 텍스트
        function getOctaveRangeText() {
            if (currentDifficulty === 'advanced') {
                const lowOct = ADV_BASE_LOW_OCT + octaveOffset;
                const highOct = ADV_BASE_HIGH_OCT + octaveOffset;
                return 'F' + lowOct + ' ~ E' + highOct;
            }
            const baseOcts = getBaseOctaves(currentClef, currentDifficulty);
            const octaves = baseOcts.map(o => o + octaveOffset);
            const low = 'C' + octaves[0];
            const high = 'B' + octaves[octaves.length - 1];
            return low + ' ~ ' + high;
        }

        // 옥타브 표시 업데이트
        // 높은음자리표: C3~C6, 낮은음자리표: C2~C5
        function getOctaveLimits(clef) {
            if (clef === 'bass') {
                return { min: 2, max: 5 };
            } else {
                return { min: 3, max: 6 };
            }
        }

        function updateOctaveDisplay() {
            const display = document.getElementById('octaveDisplay');
            if (display) display.textContent = getOctaveRangeText();
            const limits = getOctaveLimits(currentClef);
            let lowestIfDown, highestIfUp;
            if (currentDifficulty === 'advanced') {
                lowestIfDown = ADV_BASE_LOW_OCT + octaveOffset - 1;
                highestIfUp = ADV_BASE_HIGH_OCT + octaveOffset + 1;
            } else {
                const baseOcts = getBaseOctaves(currentClef, currentDifficulty);
                lowestIfDown = Math.min(...baseOcts) + octaveOffset - 1;
                highestIfUp = Math.max(...baseOcts) + octaveOffset + 1;
            }
            const downBtn = document.getElementById('octaveDown');
            const upBtn = document.getElementById('octaveUp');
            if (downBtn) downBtn.disabled = (lowestIfDown < limits.min);
            if (upBtn) upBtn.disabled = (highestIfUp > limits.max);
            updateMultiplierDisplay();
        }

        // 점수 배율 계산
        // 옥타브 변경(offset ≠ 0) → x2, 낮은음자리표 → x2, 중첩 가능
        function getScoreMultiplier() {
            let mult = 1;
            if (currentClef === 'bass') mult *= 2;
            if (octaveOffset !== 0) mult *= 2;
            return mult;
        }

        function updateMultiplierDisplay() {
            const mult = getScoreMultiplier();
            const el = document.getElementById('multiplierDisplay');
            if (el) {
                el.textContent = 'x' + mult;
                el.classList.toggle('high', mult >= 4);
            }
        }

        // 샵 ↔ 플랫 변환
        const flatToSharp = {
            'Db': 'C#', 'Eb': 'D#', 'Gb': 'F#', 'Ab': 'G#', 'Bb': 'A#'
        };
        const sharpToFlat = {
            'C#': 'Db', 'D#': 'Eb', 'F#': 'Gb', 'G#': 'Ab', 'A#': 'Bb'
        };

        // (건반 설정은 generateKeyboardConfig()에서 동적 생성)

        // 해당 흰 건반에 검은 건반이 있는지 (E, B는 없음)
        function hasBlackKey(noteName) {
            return ['C', 'D', 'F', 'G', 'A'].includes(noteName.charAt(0));
        }

        // 흰 건반 → 오른쪽 검은 건반 이름 (샵)
        function getBlackSharpName(whiteNote) {
            return whiteNote.charAt(0) + '#' + whiteNote.slice(1);
        }

        let isBlackKeyFlat = false;

        // 피아노 건반 동적 생성
        function buildPianoKeyboard(difficulty, clef) {
            const config = generateKeyboardConfig(clef || currentClef, difficulty || currentDifficulty, octaveOffset);
            const piano = document.getElementById('noteButtons');
            piano.innerHTML = '';

            if (config.compact) {
                piano.classList.add('compact');
            } else {
                piano.classList.remove('compact');
            }

            config.whiteKeys.forEach(noteName => {
                const wrapper = document.createElement('div');
                wrapper.className = 'white-key-wrapper';

                const whiteKey = document.createElement('button');
                whiteKey.className = 'piano-key';
                whiteKey.setAttribute('data-note', noteName);
                whiteKey.disabled = true;

                // 라벨: 음이름만 표시
                const letter = noteName.charAt(0);
                whiteKey.textContent = letter;

                // Middle C 표시
                if (noteName === 'C4') {
                    whiteKey.classList.add('middle-c');
                }

                wrapper.appendChild(whiteKey);

                // 검은 건반
                if (config.showBlack && hasBlackKey(noteName)) {
                    const sharpName = getBlackSharpName(noteName);
                    const blackKey = document.createElement('button');
                    blackKey.className = 'black-key';
                    blackKey.setAttribute('data-note', sharpName);
                    blackKey.setAttribute('data-sharp', sharpName);
                    blackKey.disabled = true;
                    // 검은 건반 라벨: 음이름만 (옥타브 제외)
                    blackKey.textContent = letter + '#';
                    wrapper.appendChild(blackKey);
                }

                piano.appendChild(wrapper);
            });

            isBlackKeyFlat = false;
        }

        function getDiffNames() {
            return {
                beginner: t('diffBeginner'),
                intermediate: t('diffIntermediate'),
                advanced: t('diffAdvanced')
            };
        }

        // ===== 사용자 데이터 관리 (LocalStorage) =====
        function loadData() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (raw) return JSON.parse(raw);
            } catch (e) {}
            return { users: {}, lastUser: null };
        }

        function saveData(data) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        function getUserBest(userName, difficulty) {
            const data = loadData();
            if (data.users[userName] && data.users[userName][difficulty] !== undefined) {
                return data.users[userName][difficulty];
            }
            return 0;
        }

        function setUserBest(userName, difficulty, score) {
            const data = loadData();
            if (!data.users[userName]) {
                data.users[userName] = {};
            }
            const current = data.users[userName][difficulty] || 0;
            if (score > current) {
                data.users[userName][difficulty] = score;
                saveData(data);
                return true; // 새 최고점
            }
            return false;
        }

        function addUser(name) {
            const data = loadData();
            if (data.users[name]) return false; // 이미 존재
            data.users[name] = {};
            data.lastUser = name;
            saveData(data);
            return true;
        }

        function removeUser(name) {
            const data = loadData();
            delete data.users[name];
            if (data.lastUser === name) {
                const names = Object.keys(data.users);
                data.lastUser = names.length > 0 ? names[0] : null;
            }
            saveData(data);
        }

        function getUserList() {
            const data = loadData();
            return Object.keys(data.users);
        }

        // ===== 사용자 UI =====
        function populateUserSelect() {
            const select = document.getElementById('userSelect');
            const data = loadData();
            const users = Object.keys(data.users);

            select.innerHTML = '';

            if (users.length === 0) {
                // 기본 사용자 생성
                addUser('Player 1');
                return populateUserSelect();
            }

            users.forEach(name => {
                const opt = document.createElement('option');
                opt.value = name;
                opt.textContent = name;
                select.appendChild(opt);
            });

            // 마지막 사용자 선택
            if (data.lastUser && users.includes(data.lastUser)) {
                select.value = data.lastUser;
            }

            currentUser = select.value;
            updateBestScoreDisplay();
        }

        function onUserChange() {
            currentUser = document.getElementById('userSelect').value;
            const data = loadData();
            data.lastUser = currentUser;
            saveData(data);
            updateBestScoreDisplay();
            renderScoreboard();
        }

        function onAddUser() {
            const name = prompt(t('promptUser'));
            if (!name || !name.trim()) return;
            const trimmed = name.trim();
            if (!addUser(trimmed)) {
                alert(t('alertExists'));
                return;
            }
            populateUserSelect();
            document.getElementById('userSelect').value = trimmed;
            onUserChange();
            renderScoreboard();
        }

        function onDelUser() {
            if (!currentUser) return;
            const users = getUserList();
            if (users.length <= 1) {
                alert(t('alertMinUser'));
                return;
            }
            if (!confirm(t('confirmDelete').replace('{name}', currentUser))) return;
            removeUser(currentUser);
            populateUserSelect();
            onUserChange();
            renderScoreboard();
        }

        // ===== 스코어보드 렌더링 =====
        function renderScoreboard() {
            const container = document.getElementById('scoreboardContent');
            const data = loadData();
            const users = Object.keys(data.users);
            const diffs = ['beginner', 'intermediate', 'advanced'];

            let html = '';

            diffs.forEach(diff => {
                html += `<div class="sb-diff-section">`;
                html += `<span class="sb-diff-title ${diff}">${getDiffNames()[diff]}</span>`;

                // 해당 난이도 점수가 있는 사용자만 추출, 점수 내림차순 정렬
                const entries = [];
                users.forEach(name => {
                    const s = (data.users[name] && data.users[name][diff]) || 0;
                    entries.push({ name, score: s });
                });
                entries.sort((a, b) => b.score - a.score);

                if (entries.length === 0 || entries.every(e => e.score === 0)) {
                    html += `<div class="sb-no-scores">${t('noRecords')}</div>`;
                } else {
                    html += `<table class="sb-table">`;
                    html += `<tr><th>${t('name')}</th><th style="text-align:right">${t('scoreCol')}</th></tr>`;
                    entries.forEach(e => {
                        const isCurrent = e.name === currentUser;
                        html += `<tr class="${isCurrent ? 'current-user' : ''}">`;
                        html += `<td>${e.name}</td>`;
                        html += `<td>${e.score > 0 ? e.score : '-'}</td>`;
                        html += `</tr>`;
                    });
                    html += `</table>`;
                }

                html += `</div>`;
            });

            container.innerHTML = html;
        }

        // ===== 오디오 =====
        let pianoReady = false;

        function initAudio() {
            try {
                synth = new Tone.Sampler({
                    urls: {
                        'A1':  'A1.mp3',
                        'C2':  'C2.mp3',
                        'A2':  'A2.mp3',
                        'C3':  'C3.mp3',
                        'A3':  'A3.mp3',
                        'C4':  'C4.mp3',
                        'D#4': 'Ds4.mp3',
                        'F#4': 'Fs4.mp3',
                        'A4':  'A4.mp3',
                        'C5':  'C5.mp3',
                        'D#5': 'Ds5.mp3',
                        'F#5': 'Fs5.mp3',
                        'A5':  'A5.mp3',
                        'C6':  'C6.mp3'
                    },
                    baseUrl: 'https://tonejs.github.io/audio/salamander/',
                    release: 1.5,
                    onload: () => {
                        pianoReady = true;
                        console.log('🎹 피아노 샘플 로드 완료');
                    },
                    onerror: (err) => {
                        console.error('피아노 샘플 로드 에러:', err);
                        createFallbackSynth();
                    }
                }).toDestination();

                setTimeout(() => {
                    if (!pianoReady) {
                        console.warn('피아노 샘플 로드 타임아웃, 폴백 사용');
                        createFallbackSynth();
                    }
                }, 10000);
            } catch (e) {
                console.error('Sampler 생성 실패:', e);
                createFallbackSynth();
            }
        }

        function createFallbackSynth() {
            if (pianoReady) return;
            synth = new Tone.PolySynth(Tone.Synth, {
                volume: -6,
                oscillator: { type: 'fatsine', count: 3, spread: 20 },
                envelope: { attack: 0.005, decay: 0.8, sustain: 0.1, release: 1.5 }
            }).toDestination();
            pianoReady = true;
        }

        function unlockAudio() {
            if (!audioUnlocked) {
                Tone.start();
                audioUnlocked = true;
            }
        }

        function playNote(noteName) {
            if (!synth || !audioUnlocked || !pianoReady) return;
            // 플랫을 샵으로 변환 (Tone.js Sampler는 샵 형식)
            const playable = toPlayableName(noteName);
            try {
                synth.triggerAttackRelease(playable, '4n');
            } catch (e) {
                const freq = noteFrequencies[noteName] || noteFrequencies[playable];
                if (freq) synth.triggerAttackRelease(freq, '4n');
            }
        }

        // ===== 게임 로직 =====
        function getRandomNote() {
            const pool = generateNotePool(currentClef, currentDifficulty, octaveOffset);
            return pool[Math.floor(Math.random() * pool.length)];
        }

        function updateBestScoreDisplay() {
            if (!currentUser) return;
            const best = getUserBest(currentUser, currentDifficulty);
            document.getElementById('bestScore').textContent = best;
        }

        function updateScore() {
            document.getElementById('currentScore').textContent = score;
            updateBestScoreDisplay();
        }

        function clearKeyHighlights() {
            document.querySelectorAll('.piano-key, .black-key').forEach(btn => {
                btn.classList.remove('key-correct', 'key-wrong', 'key-show-answer');
            });
        }

        function highlightKey(noteLetter, className) {
            document.querySelectorAll('.piano-key, .black-key').forEach(btn => {
                if (btn.getAttribute('data-note') === noteLetter) {
                    btn.classList.add(className);
                }
            });
        }

        // 검은 건반 라벨을 샵 또는 플랫으로 전환
        function updateBlackKeyLabels(useFlat) {
            isBlackKeyFlat = useFlat;
            document.querySelectorAll('.black-key[data-sharp]').forEach(btn => {
                const sharpNote = btn.getAttribute('data-sharp'); // e.g. "C#4"
                const letter = sharpNote.replace(/[0-9]/g, '');   // "C#"
                const octave = sharpNote.replace(/[^0-9]/g, '');  // "4"
                if (useFlat && sharpToFlat[letter]) {
                    const flatNote = sharpToFlat[letter] + octave;
                    btn.setAttribute('data-note', flatNote);
                    btn.textContent = sharpToFlat[letter]; // 옥타브 없이 표시
                } else {
                    btn.setAttribute('data-note', sharpNote);
                    btn.textContent = letter; // 옥타브 없이 표시
                }
            });
        }

        // 음표가 플랫인지 확인 (Bb, Db, Eb, Gb, Ab)
        function isFlat(noteName) {
            const letter = noteName.replace(/[0-9]/g, '');
            return ['Db', 'Eb', 'Gb', 'Ab', 'Bb'].includes(letter);
        }

        // 음표가 샵인지 확인
        function isSharp(noteName) {
            return noteName.includes('#');
        }

        function showNextNote() {
            if (!gameActive) return;
            clearKeyHighlights();
            currentNote = getRandomNote();

            // 플랫 음표면 검은 건반을 플랫으로, 샵이면 샵으로 전환
            if (isFlat(currentNote)) {
                updateBlackKeyLabels(true);
            } else if (isSharp(currentNote)) {
                updateBlackKeyLabels(false);
            }
            // 자연음이면 이전 상태 유지

            try {
                renderStaff(currentNote, null, null);
            } catch (e) {
                console.error('renderStaff 오류:', e);
            }

            setTimeout(() => {
                if (gameActive && audioUnlocked) {
                    playNote(currentNote);
                }
            }, 100);
        }

        // Tone.js용 음표 이름 변환 (플랫→샵)
        function toPlayableName(noteName) {
            const letter = noteName.replace(/[0-9]/g, '');
            const octave = noteName.replace(/[^0-9]/g, '');
            if (flatToSharp[letter]) {
                return flatToSharp[letter] + octave;
            }
            return noteName;
        }

        let pendingHistory = null; // 다음 음표로 넘어갈 때 히스토리에 추가할 항목
        let isProcessing = false; // 연속 입력 방지

        function checkAnswer(selectedNote) {
            if (!gameActive || !currentNote || isProcessing) return;
            isProcessing = true;

            const isCorrect = (selectedNote === currentNote);

            // 재생용: 플랫을 샵으로 변환 (Tone.js 호환)
            playNote(toPlayableName(selectedNote));

            clearKeyHighlights();

            if (isCorrect) {
                score += getScoreMultiplier();
                updateScore();
                addToHistory(currentNote, 'blue');
                renderStaff(currentNote, currentNote, 'blue');
                highlightKey(selectedNote, 'key-correct');
                pendingHistory = null;
            } else {
                score = Math.max(0, score - 1);
                updateScore();
                // 정답 음표는 검은색 + 계이름 라벨, 틀린 음표는 빨간색으로 겹침
                renderStaff(currentNote, currentNote, 'red', selectedNote);
                highlightKey(selectedNote, 'key-wrong');
                highlightKey(currentNote, 'key-show-answer');
                // 다음 음으로 넘어갈 때 히스토리에 추가
                pendingHistory = { note: currentNote, color: 'red' };
            }

            setTimeout(() => {
                if (gameActive) {
                    // 보류중인 히스토리가 있으면 이제 추가
                    if (pendingHistory) {
                        addToHistory(pendingHistory.note, pendingHistory.color);
                        pendingHistory = null;
                    }
                    showNextNote();
                }
                isProcessing = false;
            }, isCorrect ? 400 : 800);
        }

        // ===== 타이머 =====
        function updateTimerDisplay() {
            const min = Math.floor(timeLeft / 60);
            const sec = timeLeft % 60;
            const timerEl = document.getElementById('timer');
            timerEl.textContent = min + ':' + (sec < 10 ? '0' : '') + sec;

            if (timeLeft <= 10) {
                timerEl.classList.add('timer-warning');
            } else {
                timerEl.classList.remove('timer-warning');
            }
        }

        function startTimer() {
            timeLeft = GAME_TIME;
            updateTimerDisplay();
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        function endGame(stoppedManually) {
            gameActive = false;
            stopTimer();
            disableKeys();
            document.getElementById('stopBtn').disabled = true;

            // 사용자별 최고점수 저장
            const isNewBest = currentUser ? setUserBest(currentUser, currentDifficulty, score) : false;
            const bestScoreVal = currentUser ? getUserBest(currentUser, currentDifficulty) : 0;

            // 스코어보드 갱신
            renderScoreboard();
            updateBestScoreDisplay();

            const title = stoppedManually ? t('gameOver') : t('timeUp');

            // 게임 종료 화면
            const overlay = document.createElement('div');
            overlay.className = 'game-over-overlay';
            overlay.id = 'gameOverOverlay';
            overlay.innerHTML = `
                <div class="game-over-box">
                    <h2>${title}</h2>
                    <div>${currentUser || '?'} (${getDiffNames()[currentDifficulty]})</div>
                    <div class="final-score">${score}${t('points')}</div>
                    ${isNewBest ? '<div class="new-best">' + t('newBest') + '</div>' : '<div>' + t('bestScore') + ': ' + bestScoreVal + t('points') + '</div>'}
                    <button class="btn" onclick="closeGameOver()">${t('playAgain')}</button>
                </div>
            `;
            document.body.appendChild(overlay);
        }

        function closeGameOver() {
            const overlay = document.getElementById('gameOverOverlay');
            if (overlay) overlay.remove();
            restartGame();
        }

        function enableKeys() {
            document.querySelectorAll('.piano-key').forEach(btn => btn.disabled = false);
            const blackKeys = document.querySelectorAll('.black-key');
            const useBlack = (currentDifficulty === 'intermediate' || currentDifficulty === 'advanced');
            blackKeys.forEach(btn => {
                if (useBlack) {
                    btn.disabled = false;
                    btn.classList.add('active-black');
                } else {
                    btn.disabled = true;
                    btn.classList.remove('active-black');
                }
            });
        }

        function disableKeys() {
            document.querySelectorAll('.piano-key').forEach(btn => btn.disabled = true);
            document.querySelectorAll('.black-key').forEach(btn => {
                btn.disabled = true;
                btn.classList.remove('active-black');
            });
        }

        function startGame() {
            if (!currentUser) {
                alert(t('selectUser'));
                return;
            }
            gameActive = true;
            score = 0;
            updateScore();
            clearNoteHistory();
            setStaffClef(currentClef);
            buildPianoKeyboard(currentDifficulty);
            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
            document.getElementById('restartBtn').disabled = false;
            document.querySelectorAll('.diff-btn').forEach(btn => btn.disabled = true);
            document.querySelectorAll('.clef-btn').forEach(btn => btn.disabled = true);
            document.getElementById('octaveDown').disabled = true;
            document.getElementById('octaveUp').disabled = true;
            document.getElementById('userSelect').disabled = true;
            document.getElementById('addUserBtn').disabled = true;
            document.getElementById('delUserBtn').disabled = true;
            enableKeys();
            startTimer();
            showNextNote();
        }

        function restartGame() {
            gameActive = false;
            stopTimer();
            score = 0;
            timeLeft = GAME_TIME;
            updateTimerDisplay();
            updateScore();
            clearKeyHighlights();
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            document.getElementById('restartBtn').disabled = true;
            document.getElementById('timer').classList.remove('timer-warning');
            const overlay = document.getElementById('gameOverOverlay');
            if (overlay) overlay.remove();
            document.querySelectorAll('.diff-btn').forEach(btn => btn.disabled = false);
            document.querySelectorAll('.clef-btn').forEach(btn => btn.disabled = false);
            updateOctaveDisplay();
            document.getElementById('userSelect').disabled = false;
            document.getElementById('addUserBtn').disabled = false;
            document.getElementById('delUserBtn').disabled = false;
            setStaffClef(currentClef);
            buildPianoKeyboard(currentDifficulty);
            disableKeys();
            clearNoteHistory();
            initStaff();
        }

        // 스코어보드 토글 (모바일)
        function toggleScoreboard() {
            const panel = document.getElementById('scoreboardPanel');
            const btn = document.getElementById('sbToggleBtn');
            panel.classList.toggle('collapsed');
            btn.textContent = panel.classList.contains('collapsed') ? '▶' : '▼';
        }

        // ===== 이벤트 리스너 =====

        // 자리표 선택
        document.querySelectorAll('.clef-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                if (gameActive) return;
                document.querySelectorAll('.clef-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentClef = btn.getAttribute('data-clef');
                octaveOffset = 0;
                updateOctaveDisplay();
                setStaffClef(currentClef);
                buildPianoKeyboard(currentDifficulty);
                disableKeys();
                clearNoteHistory();
                initStaff();
                updateBestScoreDisplay();
            });
        });

        // 난이도 선택
        document.querySelectorAll('.diff-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                if (gameActive) return;
                document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentDifficulty = btn.getAttribute('data-diff');
                octaveOffset = 0;
                updateOctaveDisplay();
                buildPianoKeyboard(currentDifficulty);
                disableKeys();
                updateBestScoreDisplay();
            });
        });

        // 옥타브 조절
        document.getElementById('octaveDown').addEventListener('click', () => {
            if (gameActive || octaveOffset <= -1) return;
            octaveOffset--;
            updateOctaveDisplay();
            buildPianoKeyboard(currentDifficulty);
            disableKeys();
            clearNoteHistory();
            initStaff();
        });

        document.getElementById('octaveUp').addEventListener('click', () => {
            if (gameActive || octaveOffset >= 1) return;
            octaveOffset++;
            updateOctaveDisplay();
            buildPianoKeyboard(currentDifficulty);
            disableKeys();
            clearNoteHistory();
            initStaff();
        });

        document.getElementById('startBtn').addEventListener('click', () => {
            unlockAudio();
            startGame();
        });

        document.getElementById('stopBtn').addEventListener('click', () => {
            if (gameActive) endGame(true);
        });
        document.getElementById('restartBtn').addEventListener('click', restartGame);

        document.getElementById('userSelect').addEventListener('change', onUserChange);
        document.getElementById('addUserBtn').addEventListener('click', onAddUser);
        document.getElementById('delUserBtn').addEventListener('click', onDelUser);

        // 언어 선택
        document.getElementById('langSelect').addEventListener('change', (e) => {
            currentLang = e.target.value;
            localStorage.setItem('noteTrainerLang', currentLang);
            applyLanguage();
        });

        // 건반 클릭 (이벤트 위임 - 동적 건반 지원)
        document.getElementById('noteButtons').addEventListener('click', (e) => {
            const btn = e.target.closest('.piano-key, .black-key');
            if (!btn || !gameActive || btn.disabled) return;
            unlockAudio();
            checkAnswer(btn.getAttribute('data-note'));
        });

        document.addEventListener('click', unlockAudio, { once: true });

        let resizeTimer = null;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                if (gameActive && currentNote) {
                    renderStaff(currentNote, null, null);
                } else {
                    initStaff();
                }
            }, 150);
        });

        // ===== 초기화 =====
        function initializePage() {
            // 저장된 언어 불러오기
            const savedLang = localStorage.getItem('noteTrainerLang');
            if (savedLang && translations[savedLang]) {
                currentLang = savedLang;
                document.getElementById('langSelect').value = currentLang;
            }

            initAudio();
            populateUserSelect();
            updateOctaveDisplay();
            buildPianoKeyboard(currentDifficulty);
            disableKeys();
            updateScore();
            applyLanguage();
            initStaff();
            document.getElementById('loadingMsg').style.display = 'none';
        }

        // VexFlow 동적 로딩
        const vexFlowCDNs = [
            'https://cdn.jsdelivr.net/npm/vexflow@4.2.6/build/cjs/vexflow.js',
            'https://unpkg.com/vexflow@4.2.6/build/cjs/vexflow.js',
            'https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js',
            'https://cdn.jsdelivr.net/npm/vexflow@3.0.9/releases/vexflow-min.js',
            'https://unpkg.com/vexflow@3.0.9/releases/vexflow-min.js'
        ];

        function loadVexFlowFromCDN(index) {
            if (index >= vexFlowCDNs.length) {
                document.getElementById('loadingMsg').style.display = 'none';
                document.getElementById('errorMsg').style.display = 'block';
                document.getElementById('errorMsg').textContent = t('loadError');
                return;
            }

            const script = document.createElement('script');
            script.src = vexFlowCDNs[index];
            script.onload = function() {
                console.log('VexFlow 로드 성공:', vexFlowCDNs[index]);
                if (typeof VexFlow !== 'undefined' && typeof Vex === 'undefined') {
                    window.Vex = { Flow: VexFlow };
                }
                initializePage();
            };
            script.onerror = function() {
                console.warn('VexFlow 로드 실패:', vexFlowCDNs[index]);
                loadVexFlowFromCDN(index + 1);
            };
            document.body.appendChild(script);
        }

        loadVexFlowFromCDN(0);
    </script>
</body>
</html>
