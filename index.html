<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Sight-Reading Trainer</title>
    <script src="https://unpkg.com/vexflow@3.0.9/build/vexflow.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: #333;
        }

        .score-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
            font-size: 1.2rem;
            color: #555;
        }

        .score-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .score-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #2196F3;
        }

        .staff-container {
            background: white;
            border: 2px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            margin: 30px 0;
            min-height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        #staffCanvas {
            max-width: 100%;
            height: auto;
        }

        .controls {
            margin: 30px 0;
        }

        .btn {
            padding: 12px 30px;
            font-size: 1.1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #2196F3;
            color: white;
            font-weight: bold;
            transition: all 0.2s;
            margin: 0 10px 10px 10px;
        }

        .btn:hover {
            background: #1976D2;
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .note-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 30px;
        }

        .note-btn {
            padding: 20px 30px;
            font-size: 1.5rem;
            font-weight: bold;
            border: 3px solid #2196F3;
            border-radius: 12px;
            background: white;
            color: #2196F3;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 80px;
        }

        .note-btn:hover {
            background: #E3F2FD;
            transform: scale(1.05);
        }

        .note-btn:active {
            transform: scale(0.95);
        }

        .note-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .flash {
            animation: flash 0.3s ease-in-out;
        }

        @keyframes flash {
            0% { background-color: transparent; }
            50% { background-color: var(--flash-color); }
            100% { background-color: transparent; }
        }

        .flash-green {
            --flash-color: #4CAF50;
        }

        .flash-red {
            --flash-color: #F44336;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2rem;
            }

            .score-container {
                font-size: 1rem;
                gap: 20px;
            }

            .score-value {
                font-size: 1.5rem;
            }

            .note-btn {
                padding: 15px 20px;
                font-size: 1.3rem;
                min-width: 70px;
            }

            .btn {
                padding: 10px 20px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Music Sight-Reading Trainer</h1>
        
        <div class="score-container">
            <div class="score-item">
                <span>Score</span>
                <span class="score-value" id="currentScore">0</span>
            </div>
            <div class="score-item">
                <span>Best</span>
                <span class="score-value" id="bestScore">0</span>
            </div>
        </div>

        <div class="controls">
            <button class="btn" id="startBtn">Start</button>
            <button class="btn" id="restartBtn" disabled>Restart</button>
        </div>

        <div class="staff-container" id="staffContainer">
            <canvas id="staffCanvas"></canvas>
        </div>

        <div class="note-buttons" id="noteButtons">
            <button class="note-btn" data-note="C">C</button>
            <button class="note-btn" data-note="D">D</button>
            <button class="note-btn" data-note="E">E</button>
            <button class="note-btn" data-note="F">F</button>
            <button class="note-btn" data-note="G">G</button>
            <button class="note-btn" data-note="A">A</button>
            <button class="note-btn" data-note="B">B</button>
        </div>
    </div>

    <script>
        const { Renderer, Stave, StaveNote, Voice, Formatter, Accidental } = Vex.Flow;

        let synth;
        let currentNote = null;
        let score = 0;
        let gameActive = false;
        let audioUnlocked = false;

        const noteNames = ['C', 'D', 'E', 'F', 'G', 'A', 'B'];
        const notePitches = {
            'C': 4, 'D': 4, 'E': 4, 'F': 4, 'G': 4, 'A': 4, 'B': 4,
            'C5': 5, 'D5': 5, 'E5': 5, 'F5': 5, 'G5': 5, 'A5': 5, 'B5': 5
        };

        const noteFrequencies = {
            'C4': 261.63, 'D4': 293.66, 'E4': 329.63, 'F4': 349.23,
            'G4': 392.00, 'A4': 440.00, 'B4': 493.88,
            'C5': 523.25, 'D5': 587.33, 'E5': 659.25, 'F5': 698.46,
            'G5': 783.99, 'A5': 880.00, 'B5': 987.77
        };

        const vexFlowNotes = {
            'C4': 'c/4', 'D4': 'd/4', 'E4': 'e/4', 'F4': 'f/4',
            'G4': 'g/4', 'A4': 'a/4', 'B4': 'b/4',
            'C5': 'c/5', 'D5': 'd/5', 'E5': 'e/5', 'F5': 'f/5',
            'G5': 'g/5', 'A5': 'a/5', 'B5': 'b/5'
        };

        function initAudio() {
            synth = new Tone.Synth({
                oscillator: {
                    type: 'triangle'
                },
                envelope: {
                    attack: 0.01,
                    decay: 0.1,
                    sustain: 0.3,
                    release: 0.3
                }
            }).toDestination();
        }

        function unlockAudio() {
            if (!audioUnlocked) {
                Tone.start();
                audioUnlocked = true;
            }
        }

        function playNote(noteName) {
            if (!synth || !audioUnlocked) return;
            const freq = noteFrequencies[noteName];
            if (freq) {
                synth.triggerAttackRelease(freq, '8n');
            }
        }

        function getRandomNote() {
            const notes = Object.keys(vexFlowNotes);
            return notes[Math.floor(Math.random() * notes.length)];
        }

        function renderStaff(noteName) {
            const canvas = document.getElementById('staffCanvas');
            const container = document.getElementById('staffContainer');
            
            const containerWidth = container.clientWidth || 600;
            canvas.width = Math.min(600, containerWidth - 40);
            canvas.height = 200;

            const renderer = new Renderer(canvas, Renderer.Backends.CANVAS);
            const ctx = renderer.getContext();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.setFont('Arial', 10);

            const stave = new Stave(50, 40, canvas.width - 100);
            stave.addClef('treble');
            stave.setContext(ctx).draw();

            if (noteName) {
                const note = new StaveNote({
                    clef: 'treble',
                    keys: [vexFlowNotes[noteName]],
                    duration: 'q'
                });

                const voice = new Voice({ num_beats: 1, beat_value: 4 });
                voice.addTickables([note]);

                new Formatter().joinVoices([voice]).format([voice], canvas.width - 150);

                voice.draw(ctx, stave);
            }
        }

        function initStaff() {
            const canvas = document.getElementById('staffCanvas');
            const container = document.getElementById('staffContainer');
            
            const containerWidth = container.clientWidth || 600;
            canvas.width = Math.min(600, containerWidth - 40);
            canvas.height = 200;

            const renderer = new Renderer(canvas, Renderer.Backends.CANVAS);
            const ctx = renderer.getContext();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.setFont('Arial', 10);

            const stave = new Stave(50, 40, canvas.width - 100);
            stave.addClef('treble');
            stave.setContext(ctx).draw();
        }

        function updateScore() {
            document.getElementById('currentScore').textContent = score;
            const bestScore = parseInt(localStorage.getItem('bestScore') || '0');
            if (score > bestScore) {
                localStorage.setItem('bestScore', score.toString());
                document.getElementById('bestScore').textContent = score;
            } else {
                document.getElementById('bestScore').textContent = bestScore;
            }
        }

        function showNextNote() {
            if (!gameActive) return;

            currentNote = getRandomNote();
            renderStaff(currentNote);

            setTimeout(() => {
                if (gameActive && audioUnlocked) {
                    playNote(currentNote);
                }
            }, 100);
        }

        function checkAnswer(selectedNote) {
            if (!gameActive || !currentNote) return;

            const correctNote = currentNote.replace(/[0-9]/g, '');
            const isCorrect = selectedNote === correctNote;

            playNote(selectedNote + (currentNote.includes('5') ? '5' : '4'));

            if (isCorrect) {
                score++;
                updateScore();
                document.getElementById('staffContainer').classList.add('flash', 'flash-green');
                setTimeout(() => {
                    document.getElementById('staffContainer').classList.remove('flash', 'flash-green');
                }, 300);
            } else {
                document.getElementById('staffContainer').classList.add('flash', 'flash-red');
                setTimeout(() => {
                    document.getElementById('staffContainer').classList.remove('flash', 'flash-red');
                }, 300);
            }

            setTimeout(() => {
                if (gameActive) {
                    showNextNote();
                }
            }, 400);
        }

        function startGame() {
            gameActive = true;
            score = 0;
            updateScore();
            document.getElementById('startBtn').disabled = true;
            document.getElementById('restartBtn').disabled = false;
            
            const noteBtns = document.querySelectorAll('.note-btn');
            noteBtns.forEach(btn => btn.disabled = false);

            showNextNote();
        }

        function restartGame() {
            gameActive = false;
            score = 0;
            updateScore();
            document.getElementById('startBtn').disabled = false;
            document.getElementById('restartBtn').disabled = true;
            
            const noteBtns = document.querySelectorAll('.note-btn');
            noteBtns.forEach(btn => btn.disabled = true);

            const canvas = document.getElementById('staffCanvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        document.getElementById('startBtn').addEventListener('click', () => {
            unlockAudio();
            startGame();
        });

        document.getElementById('restartBtn').addEventListener('click', restartGame);

        document.querySelectorAll('.note-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                if (!gameActive) return;
                unlockAudio();
                const selectedNote = btn.getAttribute('data-note');
                checkAnswer(selectedNote);
            });
        });

        document.addEventListener('click', unlockAudio, { once: true });

        function initializePage() {
            initStaff();
            initAudio();
            updateScore();
        }

        if (document.readyState === 'loading') {
            window.addEventListener('load', () => {
                setTimeout(initializePage, 100);
            });
        } else {
            setTimeout(initializePage, 100);
        }

        window.addEventListener('resize', () => {
            if (!gameActive) {
                initStaff();
            }
        });

        const bestScore = parseInt(localStorage.getItem('bestScore') || '0');
        if (bestScore > 0) {
            document.getElementById('bestScore').textContent = bestScore;
        }
    </script>
</body>
</html>
