<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Sight-Reading Trainer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            padding: 20px;
        }

        /* ===== 전체 레이아웃: 게임(왼쪽) + 스코어보드(오른쪽) ===== */
        .page-wrapper {
            display: flex;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
            align-items: flex-start;
        }

        /* 게임 영역 */
        .game-area {
            flex: 1;
            min-width: 0;
            background: white;
            border-radius: 16px;
            padding: 30px 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            text-align: center;
        }

        /* 스코어보드 */
        .scoreboard {
            width: 280px;
            flex-shrink: 0;
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 15px;
            color: #333;
        }

        /* ===== 사용자 선택 ===== */
        .user-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .user-section label {
            font-weight: bold;
            color: #555;
            font-size: 0.95rem;
        }

        #userSelect {
            padding: 6px 12px;
            font-size: 1rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            background: white;
            min-width: 120px;
            cursor: pointer;
        }

        #userSelect:focus {
            border-color: #2196F3;
            outline: none;
        }

        .user-add-btn {
            padding: 6px 12px;
            font-size: 0.9rem;
            border: 2px solid #4CAF50;
            border-radius: 8px;
            background: #4CAF50;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .user-add-btn:hover {
            background: #388E3C;
        }

        .user-del-btn {
            padding: 6px 10px;
            font-size: 0.9rem;
            border: 2px solid #F44336;
            border-radius: 8px;
            background: white;
            color: #F44336;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .user-del-btn:hover {
            background: #F44336;
            color: white;
        }

        .score-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 20px;
            font-size: 1.1rem;
            color: #555;
        }

        .score-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .score-value {
            font-size: 1.6rem;
            font-weight: bold;
            color: #2196F3;
        }

        .staff-container {
            background: white;
            border: 2px solid #ddd;
            border-radius: 8px;
            padding: 10px;
            margin: 15px auto;
            min-height: 180px;
            max-width: 440px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        #staffCanvas {
            max-width: 100%;
            width: 420px;
            height: 180px;
            display: block;
            background: white;
        }

        .controls {
            margin: 20px 0;
        }

        .btn {
            padding: 10px 24px;
            font-size: 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #2196F3;
            color: white;
            font-weight: bold;
            transition: all 0.2s;
            margin: 0 8px 8px 8px;
        }

        .btn:hover {
            background: #1976D2;
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        /* 난이도 선택 */
        .difficulty-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .diff-btn {
            padding: 7px 18px;
            font-size: 0.95rem;
            font-weight: bold;
            border: 2px solid #ccc;
            border-radius: 20px;
            background: white;
            color: #777;
            cursor: pointer;
            transition: all 0.2s;
        }

        .diff-btn:hover {
            border-color: #2196F3;
            color: #2196F3;
        }

        .diff-btn.active {
            background: #2196F3;
            border-color: #2196F3;
            color: white;
        }

        .diff-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .piano-container {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            overflow-x: auto;
        }

        .piano {
            display: flex;
            position: relative;
            height: 200px;
            user-select: none;
        }

        .white-key-wrapper {
            position: relative;
            width: 64px;
            height: 200px;
        }

        /* Middle C 표시 */
        .piano-key.middle-c {
            border-bottom: 4px solid #FF9800;
        }
        .piano-key.middle-c::after {
            content: 'M';
            position: absolute;
            top: 6px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.6rem;
            font-weight: bold;
            color: #FF9800;
            opacity: 0.7;
        }

        .piano-key {
            position: relative;
            width: 64px;
            height: 200px;
            background: linear-gradient(to bottom, #f8f8f8, #fff 10%, #fff 85%, #e0e0e0);
            border: 1px solid #999;
            border-radius: 0 0 6px 6px;
            cursor: pointer;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 14px;
            font-size: 1.3rem;
            font-weight: bold;
            color: #555;
            transition: all 0.08s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15), inset 0 -2px 3px rgba(0,0,0,0.05);
            z-index: 1;
            margin-left: -1px;
        }

        .white-key-wrapper:first-child .piano-key {
            margin-left: 0;
        }

        .piano-key:hover {
            background: linear-gradient(to bottom, #eef5ff, #e3f0ff 10%, #e3f0ff 85%, #d0e4ff);
        }

        .piano-key:active,
        .piano-key.key-pressed {
            background: linear-gradient(to bottom, #ddd, #eee);
            box-shadow: 0 1px 2px rgba(0,0,0,0.2), inset 0 -1px 1px rgba(0,0,0,0.05);
            transform: translateY(2px);
            height: 198px;
        }

        .piano-key:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: linear-gradient(to bottom, #eee, #e5e5e5);
        }

        .piano-key:disabled:hover {
            background: linear-gradient(to bottom, #eee, #e5e5e5);
        }

        .piano-key:disabled:active {
            transform: none;
            height: 200px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15), inset 0 -2px 3px rgba(0,0,0,0.05);
        }

        .piano-key.key-correct {
            background: linear-gradient(to bottom, #66BB6A, #43A047 10%, #388E3C 85%, #2E7D32) !important;
            color: white !important;
            border-color: #2E7D32;
        }

        .piano-key.key-wrong {
            background: linear-gradient(to bottom, #EF5350, #F44336 10%, #E53935 85%, #D32F2F) !important;
            color: white !important;
            border-color: #D32F2F;
        }

        .piano-key.key-show-answer {
            box-shadow: 0 0 0 4px #F44336, 0 4px 8px rgba(0,0,0,0.15) !important;
            color: #F44336 !important;
            font-size: 1.5rem !important;
            border-color: #F44336 !important;
        }

        .black-key {
            position: absolute;
            top: 0;
            right: -20px;
            width: 38px;
            height: 120px;
            background: linear-gradient(to bottom, #333, #1a1a1a 40%, #111 90%, #000);
            border: 1px solid #000;
            border-radius: 0 0 4px 4px;
            z-index: 2;
            box-shadow: 0 4px 6px rgba(0,0,0,0.4), inset 0 -2px 4px rgba(255,255,255,0.05);
            pointer-events: none;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 8px;
            font-size: 0.75rem;
            font-weight: bold;
            color: transparent;
            cursor: default;
        }

        .black-key.active-black {
            pointer-events: auto;
            cursor: pointer;
            color: #ccc;
        }

        .black-key.active-black:hover {
            background: linear-gradient(to bottom, #555, #333 40%, #222 90%, #111);
        }

        .black-key.active-black:active {
            background: linear-gradient(to bottom, #444, #222);
            box-shadow: 0 1px 2px rgba(0,0,0,0.3);
            transform: translateY(2px);
            height: 118px;
        }

        .black-key.active-black:disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .black-key.key-correct {
            background: linear-gradient(to bottom, #66BB6A, #43A047 40%, #388E3C 90%, #2E7D32) !important;
            color: white !important;
        }

        .black-key.key-wrong {
            background: linear-gradient(to bottom, #EF5350, #F44336 40%, #E53935 90%, #D32F2F) !important;
            color: white !important;
        }

        .black-key.key-show-answer {
            box-shadow: 0 0 0 3px #F44336, 0 4px 6px rgba(0,0,0,0.4) !important;
            color: #F44336 !important;
        }

        /* ===== 컴팩트 키보드 (중급/고급) ===== */
        .piano.compact { height: 180px; }
        .piano.compact .white-key-wrapper { width: 40px; height: 180px; }
        .piano.compact .piano-key {
            width: 40px; height: 180px;
            font-size: 0.85rem; padding-bottom: 10px;
        }
        .piano.compact .piano-key:active,
        .piano.compact .piano-key.key-pressed { height: 178px; }
        .piano.compact .black-key {
            width: 26px; height: 108px; right: -13px; font-size: 0.55rem;
        }
        .piano.compact .black-key.active-black:active { height: 106px; }
        .piano.compact .piano-key.middle-c::after { font-size: 0.5rem; top: 4px; }

        .flash-green { animation: flashGreen 0.3s ease-in-out; }
        .flash-red { animation: flashRed 0.3s ease-in-out; }

        @keyframes flashGreen {
            0% { background-color: white; }
            50% { background-color: #4CAF50; }
            100% { background-color: white; }
        }
        @keyframes flashRed {
            0% { background-color: white; }
            50% { background-color: #F44336; }
            100% { background-color: white; }
        }

        #loadingMsg { color: #999; font-size: 1rem; }
        #errorMsg { color: red; padding: 10px; }

        .timer-warning {
            color: #F44336 !important;
            animation: pulse 0.5s ease-in-out infinite alternate;
        }

        @keyframes pulse {
            from { opacity: 1; }
            to { opacity: 0.4; }
        }

        /* ===== 게임 종료 오버레이 ===== */
        .game-over-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .game-over-box {
            background: white;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 90%;
        }

        .game-over-box h2 { font-size: 2rem; color: #333; margin-bottom: 20px; }
        .game-over-box .final-score { font-size: 3rem; font-weight: bold; color: #2196F3; margin: 15px 0; }
        .game-over-box .new-best { color: #4CAF50; font-weight: bold; font-size: 1.2rem; margin-bottom: 15px; }
        .game-over-box .btn { margin-top: 20px; }

        /* ===== 스코어보드 ===== */
        .scoreboard h2 {
            font-size: 1.3rem;
            color: #333;
            margin-bottom: 15px;
            text-align: center;
            padding-bottom: 10px;
            border-bottom: 2px solid #eee;
        }

        .sb-diff-section {
            margin-bottom: 16px;
        }

        .sb-diff-title {
            font-size: 0.85rem;
            font-weight: bold;
            color: white;
            padding: 5px 12px;
            border-radius: 12px;
            display: inline-block;
            margin-bottom: 8px;
        }

        .sb-diff-title.beginner { background: #4CAF50; }
        .sb-diff-title.intermediate { background: #FF9800; }
        .sb-diff-title.advanced { background: #F44336; }

        .sb-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        .sb-table th {
            text-align: left;
            padding: 4px 8px;
            color: #999;
            font-size: 0.8rem;
            border-bottom: 1px solid #eee;
        }

        .sb-table td {
            padding: 5px 8px;
            border-bottom: 1px solid #f5f5f5;
        }

        .sb-table td:last-child {
            text-align: right;
            font-weight: bold;
            color: #2196F3;
        }

        .sb-table tr.current-user td {
            background: #E3F2FD;
            font-weight: bold;
        }

        .sb-table tr.current-user td:first-child::before {
            content: '▸ ';
            color: #2196F3;
        }

        .sb-no-scores {
            color: #ccc;
            font-size: 0.85rem;
            text-align: center;
            padding: 8px;
        }

        /* ===== 반응형 ===== */
        @media (max-width: 900px) {
            .page-wrapper {
                flex-direction: column;
            }

            .scoreboard {
                width: 100%;
                order: 2;
            }

            .game-area {
                order: 1;
            }
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.6rem; }

            .score-container {
                font-size: 0.95rem;
                gap: 15px;
            }

            .score-value { font-size: 1.3rem; }

            .white-key-wrapper {
                width: 48px;
                height: 160px;
            }

            .piano { height: 160px; }

            .piano-key {
                width: 48px;
                height: 160px;
                font-size: 1.1rem;
                padding-bottom: 10px;
            }

            .piano-key:active,
            .piano-key.key-pressed {
                height: 158px;
            }

            .black-key {
                width: 30px;
                height: 95px;
                right: -16px;
                font-size: 0.6rem;
            }

            .piano.compact .white-key-wrapper { width: 28px; height: 140px; }
            .piano.compact .piano-key { width: 28px; height: 140px; font-size: 0.6rem; padding-bottom: 6px; }
            .piano.compact .piano-key:active { height: 138px; }
            .piano.compact .black-key { width: 18px; height: 84px; right: -9px; font-size: 0.4rem; }

            .diff-btn {
                padding: 6px 14px;
                font-size: 0.85rem;
            }

            .btn {
                padding: 8px 18px;
                font-size: 0.95rem;
            }

            .user-section {
                gap: 5px;
            }

            #userSelect {
                min-width: 80px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <!-- 게임 영역 -->
        <div class="game-area">
            <h1>🎵 Music Sight-Reading</h1>

            <!-- 사용자 선택 -->
            <div class="user-section">
                <label>👤</label>
                <select id="userSelect"></select>
                <button class="user-add-btn" id="addUserBtn">+ 추가</button>
                <button class="user-del-btn" id="delUserBtn">삭제</button>
            </div>

            <div class="score-container">
                <div class="score-item">
                    <span>Score</span>
                    <span class="score-value" id="currentScore">0</span>
                </div>
                <div class="score-item">
                    <span>Best</span>
                    <span class="score-value" id="bestScore">0</span>
                </div>
                <div class="score-item">
                    <span>Time</span>
                    <span class="score-value" id="timer">1:00</span>
                </div>
            </div>

            <div class="difficulty-container">
                <button class="diff-btn active" data-diff="beginner">초급</button>
                <button class="diff-btn" data-diff="intermediate">중급</button>
                <button class="diff-btn" data-diff="advanced">고급</button>
            </div>

            <div class="controls">
                <button class="btn" id="startBtn">Start</button>
                <button class="btn" id="stopBtn" disabled style="background:#F44336;">Stop</button>
                <button class="btn" id="restartBtn" disabled>Restart</button>
            </div>

            <div class="staff-container" id="staffContainer">
                <div id="staffDiv"></div>
                <div id="loadingMsg">Loading...</div>
                <div id="errorMsg" style="display: none;"></div>
            </div>

            <div class="piano-container">
                <div class="piano" id="noteButtons"></div>
            </div>
        </div>

        <!-- 스코어보드 -->
        <div class="scoreboard">
            <h2>🏆 Score Board</h2>
            <div id="scoreboardContent"></div>
        </div>
    </div>

    <!-- 1. Tone.js 로드 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

    <!-- 2. 악보 렌더링 (VexFlow) -->
    <script src="staff.js"></script>

    <!-- 3. 게임 로직 -->
    <script>
        // ===== 상태 변수 =====
        let synth = null;
        let currentNote = null;
        let score = 0;
        let gameActive = false;
        let audioUnlocked = false;
        let timerInterval = null;
        let timeLeft = 60;
        const GAME_TIME = 60;
        let currentDifficulty = 'beginner';
        let currentUser = null;

        const STORAGE_KEY = 'noteTrainerData';

        // 전체 음표 주파수 (자연음 + 샵 + 플랫)
        const noteFrequencies = {
            'G3': 196.00, 'A3': 220.00, 'B3': 246.94,
            'C4': 261.63, 'D4': 293.66, 'E4': 329.63, 'F4': 349.23,
            'G4': 392.00, 'A4': 440.00, 'B4': 493.88,
            'C5': 523.25, 'D5': 587.33, 'E5': 659.25, 'F5': 698.46,
            'G5': 783.99, 'A5': 880.00, 'B5': 987.77,
            'G#3': 207.65, 'A#3': 233.08,
            'C#4': 277.18, 'D#4': 311.13, 'F#4': 369.99, 'G#4': 415.30, 'A#4': 466.16,
            'C#5': 554.37, 'D#5': 622.25, 'F#5': 739.99, 'G#5': 830.61,
            'Ab3': 207.65, 'Bb3': 233.08,
            'Db4': 277.18, 'Eb4': 311.13, 'Gb4': 369.99, 'Ab4': 415.30, 'Bb4': 466.16,
            'Db5': 554.37, 'Eb5': 622.25, 'Gb5': 739.99, 'Ab5': 830.61
        };

        // 난이도별 음표 풀
        const notePools = {
            beginner: [
                'C4', 'D4', 'E4', 'F4', 'G4', 'A4', 'B4'
            ],
            intermediate: [
                'G3', 'A3', 'B3',
                'C4', 'D4', 'E4', 'F4', 'G4', 'A4', 'B4',
                'C5', 'D5', 'E5', 'F5', 'G5', 'A5',
                'G#3', 'A#3',
                'C#4', 'D#4', 'F#4', 'G#4', 'A#4',
                'C#5', 'D#5', 'F#5', 'G#5',
                'Ab3', 'Bb3',
                'Db4', 'Eb4', 'Gb4', 'Ab4', 'Bb4',
                'Db5', 'Eb5', 'Gb5', 'Ab5'
            ],
            advanced: [
                'G3', 'A3', 'B3',
                'C4', 'D4', 'E4', 'F4', 'G4', 'A4', 'B4',
                'C5', 'D5', 'E5', 'F5', 'G5', 'A5',
                'G#3', 'A#3',
                'C#4', 'D#4', 'F#4', 'G#4', 'A#4',
                'C#5', 'D#5', 'F#5', 'G#5',
                'Ab3', 'Bb3',
                'Db4', 'Eb4', 'Gb4', 'Ab4', 'Bb4',
                'Db5', 'Eb5', 'Gb5', 'Ab5'
            ]
        };

        // 샵 ↔ 플랫 변환
        const flatToSharp = {
            'Db': 'C#', 'Eb': 'D#', 'Gb': 'F#', 'Ab': 'G#', 'Bb': 'A#'
        };
        const sharpToFlat = {
            'C#': 'Db', 'D#': 'Eb', 'F#': 'Gb', 'G#': 'Ab', 'A#': 'Bb'
        };

        // 건반 설정
        const keyboardConfigs = {
            beginner: {
                whiteKeys: ['C4', 'D4', 'E4', 'F4', 'G4', 'A4', 'B4'],
                showBlack: true,
                compact: false
            },
            intermediate: {
                whiteKeys: ['G3', 'A3', 'B3', 'C4', 'D4', 'E4', 'F4', 'G4', 'A4', 'B4', 'C5', 'D5', 'E5', 'F5', 'G5', 'A5'],
                showBlack: true,
                compact: true
            },
            advanced: {
                whiteKeys: ['G3', 'A3', 'B3', 'C4', 'D4', 'E4', 'F4', 'G4', 'A4', 'B4', 'C5', 'D5', 'E5', 'F5', 'G5', 'A5'],
                showBlack: true,
                compact: true
            }
        };

        // 해당 흰 건반에 검은 건반이 있는지 (E, B는 없음)
        function hasBlackKey(noteName) {
            return ['C', 'D', 'F', 'G', 'A'].includes(noteName.charAt(0));
        }

        // 흰 건반 → 오른쪽 검은 건반 이름 (샵)
        function getBlackSharpName(whiteNote) {
            return whiteNote.charAt(0) + '#' + whiteNote.slice(1);
        }

        let isBlackKeyFlat = false;

        // 피아노 건반 동적 생성
        function buildPianoKeyboard(difficulty) {
            const config = keyboardConfigs[difficulty] || keyboardConfigs.beginner;
            const piano = document.getElementById('noteButtons');
            piano.innerHTML = '';

            if (config.compact) {
                piano.classList.add('compact');
            } else {
                piano.classList.remove('compact');
            }

            config.whiteKeys.forEach(noteName => {
                const wrapper = document.createElement('div');
                wrapper.className = 'white-key-wrapper';

                const whiteKey = document.createElement('button');
                whiteKey.className = 'piano-key';
                whiteKey.setAttribute('data-note', noteName);
                whiteKey.disabled = true;

                // 라벨: 음이름만 표시
                const letter = noteName.charAt(0);
                whiteKey.textContent = letter;

                // Middle C 표시
                if (noteName === 'C4') {
                    whiteKey.classList.add('middle-c');
                }

                wrapper.appendChild(whiteKey);

                // 검은 건반
                if (config.showBlack && hasBlackKey(noteName)) {
                    const sharpName = getBlackSharpName(noteName);
                    const blackKey = document.createElement('button');
                    blackKey.className = 'black-key';
                    blackKey.setAttribute('data-note', sharpName);
                    blackKey.setAttribute('data-sharp', sharpName);
                    blackKey.disabled = true;
                    // 검은 건반 라벨: 음이름만 (옥타브 제외)
                    blackKey.textContent = letter + '#';
                    wrapper.appendChild(blackKey);
                }

                piano.appendChild(wrapper);
            });

            isBlackKeyFlat = false;
        }

        const diffNames = {
            beginner: '초급',
            intermediate: '중급',
            advanced: '고급'
        };

        // ===== 사용자 데이터 관리 (LocalStorage) =====
        function loadData() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (raw) return JSON.parse(raw);
            } catch (e) {}
            return { users: {}, lastUser: null };
        }

        function saveData(data) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        function getUserBest(userName, difficulty) {
            const data = loadData();
            if (data.users[userName] && data.users[userName][difficulty] !== undefined) {
                return data.users[userName][difficulty];
            }
            return 0;
        }

        function setUserBest(userName, difficulty, score) {
            const data = loadData();
            if (!data.users[userName]) {
                data.users[userName] = {};
            }
            const current = data.users[userName][difficulty] || 0;
            if (score > current) {
                data.users[userName][difficulty] = score;
                saveData(data);
                return true; // 새 최고점
            }
            return false;
        }

        function addUser(name) {
            const data = loadData();
            if (data.users[name]) return false; // 이미 존재
            data.users[name] = {};
            data.lastUser = name;
            saveData(data);
            return true;
        }

        function removeUser(name) {
            const data = loadData();
            delete data.users[name];
            if (data.lastUser === name) {
                const names = Object.keys(data.users);
                data.lastUser = names.length > 0 ? names[0] : null;
            }
            saveData(data);
        }

        function getUserList() {
            const data = loadData();
            return Object.keys(data.users);
        }

        // ===== 사용자 UI =====
        function populateUserSelect() {
            const select = document.getElementById('userSelect');
            const data = loadData();
            const users = Object.keys(data.users);

            select.innerHTML = '';

            if (users.length === 0) {
                // 기본 사용자 생성
                addUser('Player 1');
                return populateUserSelect();
            }

            users.forEach(name => {
                const opt = document.createElement('option');
                opt.value = name;
                opt.textContent = name;
                select.appendChild(opt);
            });

            // 마지막 사용자 선택
            if (data.lastUser && users.includes(data.lastUser)) {
                select.value = data.lastUser;
            }

            currentUser = select.value;
            updateBestScoreDisplay();
        }

        function onUserChange() {
            currentUser = document.getElementById('userSelect').value;
            const data = loadData();
            data.lastUser = currentUser;
            saveData(data);
            updateBestScoreDisplay();
            renderScoreboard();
        }

        function onAddUser() {
            const name = prompt('새 사용자 이름을 입력하세요:');
            if (!name || !name.trim()) return;
            const trimmed = name.trim();
            if (!addUser(trimmed)) {
                alert('이미 존재하는 이름입니다.');
                return;
            }
            populateUserSelect();
            document.getElementById('userSelect').value = trimmed;
            onUserChange();
            renderScoreboard();
        }

        function onDelUser() {
            if (!currentUser) return;
            const users = getUserList();
            if (users.length <= 1) {
                alert('최소 1명의 사용자가 필요합니다.');
                return;
            }
            if (!confirm(`"${currentUser}" 사용자를 삭제하시겠습니까?\n모든 점수 기록이 삭제됩니다.`)) return;
            removeUser(currentUser);
            populateUserSelect();
            onUserChange();
            renderScoreboard();
        }

        // ===== 스코어보드 렌더링 =====
        function renderScoreboard() {
            const container = document.getElementById('scoreboardContent');
            const data = loadData();
            const users = Object.keys(data.users);
            const diffs = ['beginner', 'intermediate', 'advanced'];

            let html = '';

            diffs.forEach(diff => {
                html += `<div class="sb-diff-section">`;
                html += `<span class="sb-diff-title ${diff}">${diffNames[diff]}</span>`;

                // 해당 난이도 점수가 있는 사용자만 추출, 점수 내림차순 정렬
                const entries = [];
                users.forEach(name => {
                    const s = (data.users[name] && data.users[name][diff]) || 0;
                    entries.push({ name, score: s });
                });
                entries.sort((a, b) => b.score - a.score);

                if (entries.length === 0 || entries.every(e => e.score === 0)) {
                    html += `<div class="sb-no-scores">아직 기록이 없습니다</div>`;
                } else {
                    html += `<table class="sb-table">`;
                    html += `<tr><th>이름</th><th style="text-align:right">점수</th></tr>`;
                    entries.forEach(e => {
                        const isCurrent = e.name === currentUser;
                        html += `<tr class="${isCurrent ? 'current-user' : ''}">`;
                        html += `<td>${e.name}</td>`;
                        html += `<td>${e.score > 0 ? e.score : '-'}</td>`;
                        html += `</tr>`;
                    });
                    html += `</table>`;
                }

                html += `</div>`;
            });

            container.innerHTML = html;
        }

        // ===== 오디오 =====
        let pianoReady = false;

        function initAudio() {
            try {
                synth = new Tone.Sampler({
                    urls: {
                        'A3':  'A3.mp3',
                        'C4':  'C4.mp3',
                        'D#4': 'Ds4.mp3',
                        'F#4': 'Fs4.mp3',
                        'A4':  'A4.mp3',
                        'C5':  'C5.mp3',
                        'D#5': 'Ds5.mp3',
                        'F#5': 'Fs5.mp3',
                        'A5':  'A5.mp3',
                        'C6':  'C6.mp3'
                    },
                    baseUrl: 'https://tonejs.github.io/audio/salamander/',
                    release: 1.5,
                    onload: () => {
                        pianoReady = true;
                        console.log('🎹 피아노 샘플 로드 완료');
                    },
                    onerror: (err) => {
                        console.error('피아노 샘플 로드 에러:', err);
                        createFallbackSynth();
                    }
                }).toDestination();

                setTimeout(() => {
                    if (!pianoReady) {
                        console.warn('피아노 샘플 로드 타임아웃, 폴백 사용');
                        createFallbackSynth();
                    }
                }, 10000);
            } catch (e) {
                console.error('Sampler 생성 실패:', e);
                createFallbackSynth();
            }
        }

        function createFallbackSynth() {
            if (pianoReady) return;
            synth = new Tone.PolySynth(Tone.Synth, {
                volume: -6,
                oscillator: { type: 'fatsine', count: 3, spread: 20 },
                envelope: { attack: 0.005, decay: 0.8, sustain: 0.1, release: 1.5 }
            }).toDestination();
            pianoReady = true;
        }

        function unlockAudio() {
            if (!audioUnlocked) {
                Tone.start();
                audioUnlocked = true;
            }
        }

        function playNote(noteName) {
            if (!synth || !audioUnlocked || !pianoReady) return;
            // 플랫을 샵으로 변환 (Tone.js Sampler는 샵 형식)
            const playable = toPlayableName(noteName);
            try {
                synth.triggerAttackRelease(playable, '4n');
            } catch (e) {
                const freq = noteFrequencies[noteName] || noteFrequencies[playable];
                if (freq) synth.triggerAttackRelease(freq, '4n');
            }
        }

        // ===== 게임 로직 =====
        function getRandomNote() {
            const pool = notePools[currentDifficulty] || notePools.beginner;
            return pool[Math.floor(Math.random() * pool.length)];
        }

        function updateBestScoreDisplay() {
            if (!currentUser) return;
            const best = getUserBest(currentUser, currentDifficulty);
            document.getElementById('bestScore').textContent = best;
        }

        function updateScore() {
            document.getElementById('currentScore').textContent = score;
            updateBestScoreDisplay();
        }

        function clearKeyHighlights() {
            document.querySelectorAll('.piano-key, .black-key').forEach(btn => {
                btn.classList.remove('key-correct', 'key-wrong', 'key-show-answer');
            });
        }

        function highlightKey(noteLetter, className) {
            document.querySelectorAll('.piano-key, .black-key').forEach(btn => {
                if (btn.getAttribute('data-note') === noteLetter) {
                    btn.classList.add(className);
                }
            });
        }

        // 검은 건반 라벨을 샵 또는 플랫으로 전환
        function updateBlackKeyLabels(useFlat) {
            isBlackKeyFlat = useFlat;
            document.querySelectorAll('.black-key[data-sharp]').forEach(btn => {
                const sharpNote = btn.getAttribute('data-sharp'); // e.g. "C#4"
                const letter = sharpNote.replace(/[0-9]/g, '');   // "C#"
                const octave = sharpNote.replace(/[^0-9]/g, '');  // "4"
                if (useFlat && sharpToFlat[letter]) {
                    const flatNote = sharpToFlat[letter] + octave;
                    btn.setAttribute('data-note', flatNote);
                    btn.textContent = sharpToFlat[letter]; // 옥타브 없이 표시
                } else {
                    btn.setAttribute('data-note', sharpNote);
                    btn.textContent = letter; // 옥타브 없이 표시
                }
            });
        }

        // 음표가 플랫인지 확인 (Bb, Db, Eb, Gb, Ab)
        function isFlat(noteName) {
            const letter = noteName.replace(/[0-9]/g, '');
            return ['Db', 'Eb', 'Gb', 'Ab', 'Bb'].includes(letter);
        }

        // 음표가 샵인지 확인
        function isSharp(noteName) {
            return noteName.includes('#');
        }

        function showNextNote() {
            if (!gameActive) return;
            clearKeyHighlights();
            currentNote = getRandomNote();

            // 플랫 음표면 검은 건반을 플랫으로, 샵이면 샵으로 전환
            if (isFlat(currentNote)) {
                updateBlackKeyLabels(true);
            } else if (isSharp(currentNote)) {
                updateBlackKeyLabels(false);
            }
            // 자연음이면 이전 상태 유지

            try {
                renderStaff(currentNote, null, null);
            } catch (e) {
                console.error('renderStaff 오류:', e);
            }

            setTimeout(() => {
                if (gameActive && audioUnlocked) {
                    playNote(currentNote);
                }
            }, 100);
        }

        // Tone.js용 음표 이름 변환 (플랫→샵)
        function toPlayableName(noteName) {
            const letter = noteName.replace(/[0-9]/g, '');
            const octave = noteName.replace(/[^0-9]/g, '');
            if (flatToSharp[letter]) {
                return flatToSharp[letter] + octave;
            }
            return noteName;
        }

        function checkAnswer(selectedNote) {
            if (!gameActive || !currentNote) return;

            const isCorrect = (selectedNote === currentNote);

            // 재생용: 플랫을 샵으로 변환 (Tone.js 호환)
            playNote(toPlayableName(selectedNote));

            clearKeyHighlights();

            if (isCorrect) {
                score++;
                updateScore();
                addToHistory(currentNote, 'blue');
                renderStaff(currentNote, currentNote, 'blue');
                highlightKey(selectedNote, 'key-correct');
            } else {
                addToHistory(currentNote, 'red');
                renderStaff(currentNote, currentNote, 'red');
                highlightKey(selectedNote, 'key-wrong');
                highlightKey(currentNote, 'key-show-answer');
            }

            setTimeout(() => {
                if (gameActive) showNextNote();
            }, isCorrect ? 400 : 800);
        }

        // ===== 타이머 =====
        function updateTimerDisplay() {
            const min = Math.floor(timeLeft / 60);
            const sec = timeLeft % 60;
            const timerEl = document.getElementById('timer');
            timerEl.textContent = min + ':' + (sec < 10 ? '0' : '') + sec;

            if (timeLeft <= 10) {
                timerEl.classList.add('timer-warning');
            } else {
                timerEl.classList.remove('timer-warning');
            }
        }

        function startTimer() {
            timeLeft = GAME_TIME;
            updateTimerDisplay();
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        function endGame(stoppedManually) {
            gameActive = false;
            stopTimer();
            disableKeys();
            document.getElementById('stopBtn').disabled = true;

            // 사용자별 최고점수 저장
            const isNewBest = currentUser ? setUserBest(currentUser, currentDifficulty, score) : false;
            const bestScoreVal = currentUser ? getUserBest(currentUser, currentDifficulty) : 0;

            // 스코어보드 갱신
            renderScoreboard();
            updateBestScoreDisplay();

            const title = stoppedManually ? '🛑 게임 종료!' : '⏰ 시간 종료!';

            // 게임 종료 화면
            const overlay = document.createElement('div');
            overlay.className = 'game-over-overlay';
            overlay.id = 'gameOverOverlay';
            overlay.innerHTML = `
                <div class="game-over-box">
                    <h2>${title}</h2>
                    <div>${currentUser || '?'} (${diffNames[currentDifficulty]})</div>
                    <div class="final-score">${score}점</div>
                    ${isNewBest ? '<div class="new-best">🎉 새로운 최고점수!</div>' : '<div>최고점수: ' + bestScoreVal + '점</div>'}
                    <button class="btn" onclick="closeGameOver()">다시 하기</button>
                </div>
            `;
            document.body.appendChild(overlay);
        }

        function closeGameOver() {
            const overlay = document.getElementById('gameOverOverlay');
            if (overlay) overlay.remove();
            restartGame();
        }

        function enableKeys() {
            document.querySelectorAll('.piano-key').forEach(btn => btn.disabled = false);
            const blackKeys = document.querySelectorAll('.black-key');
            const useBlack = (currentDifficulty === 'intermediate' || currentDifficulty === 'advanced');
            blackKeys.forEach(btn => {
                if (useBlack) {
                    btn.disabled = false;
                    btn.classList.add('active-black');
                } else {
                    btn.disabled = true;
                    btn.classList.remove('active-black');
                }
            });
        }

        function disableKeys() {
            document.querySelectorAll('.piano-key').forEach(btn => btn.disabled = true);
            document.querySelectorAll('.black-key').forEach(btn => {
                btn.disabled = true;
                btn.classList.remove('active-black');
            });
        }

        function startGame() {
            if (!currentUser) {
                alert('사용자를 선택해주세요.');
                return;
            }
            gameActive = true;
            score = 0;
            updateScore();
            clearNoteHistory();
            buildPianoKeyboard(currentDifficulty);
            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
            document.getElementById('restartBtn').disabled = false;
            document.querySelectorAll('.diff-btn').forEach(btn => btn.disabled = true);
            document.getElementById('userSelect').disabled = true;
            document.getElementById('addUserBtn').disabled = true;
            document.getElementById('delUserBtn').disabled = true;
            enableKeys();
            startTimer();
            showNextNote();
        }

        function restartGame() {
            gameActive = false;
            stopTimer();
            score = 0;
            timeLeft = GAME_TIME;
            updateTimerDisplay();
            updateScore();
            clearKeyHighlights();
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            document.getElementById('restartBtn').disabled = true;
            document.getElementById('timer').classList.remove('timer-warning');
            const overlay = document.getElementById('gameOverOverlay');
            if (overlay) overlay.remove();
            document.querySelectorAll('.diff-btn').forEach(btn => btn.disabled = false);
            document.getElementById('userSelect').disabled = false;
            document.getElementById('addUserBtn').disabled = false;
            document.getElementById('delUserBtn').disabled = false;
            buildPianoKeyboard(currentDifficulty);
            disableKeys();
            clearNoteHistory();
            initStaff();
        }

        // ===== 이벤트 리스너 =====

        // 난이도 선택
        document.querySelectorAll('.diff-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                if (gameActive) return;
                document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentDifficulty = btn.getAttribute('data-diff');
                buildPianoKeyboard(currentDifficulty);
                disableKeys();
                updateBestScoreDisplay();
            });
        });

        document.getElementById('startBtn').addEventListener('click', () => {
            unlockAudio();
            startGame();
        });

        document.getElementById('stopBtn').addEventListener('click', () => {
            if (gameActive) endGame(true);
        });
        document.getElementById('restartBtn').addEventListener('click', restartGame);

        document.getElementById('userSelect').addEventListener('change', onUserChange);
        document.getElementById('addUserBtn').addEventListener('click', onAddUser);
        document.getElementById('delUserBtn').addEventListener('click', onDelUser);

        // 건반 클릭 (이벤트 위임 - 동적 건반 지원)
        document.getElementById('noteButtons').addEventListener('click', (e) => {
            const btn = e.target.closest('.piano-key, .black-key');
            if (!btn || !gameActive || btn.disabled) return;
            unlockAudio();
            checkAnswer(btn.getAttribute('data-note'));
        });

        document.addEventListener('click', unlockAudio, { once: true });

        window.addEventListener('resize', () => {
            if (!gameActive) initStaff();
        });

        // ===== 초기화 =====
        function initializePage() {
            initAudio();
            populateUserSelect();
            buildPianoKeyboard(currentDifficulty);
            disableKeys();
            updateScore();
            renderScoreboard();
            initStaff();
            document.getElementById('loadingMsg').style.display = 'none';
        }

        // VexFlow 동적 로딩
        const vexFlowCDNs = [
            'https://cdn.jsdelivr.net/npm/vexflow@4.2.6/build/cjs/vexflow.js',
            'https://unpkg.com/vexflow@4.2.6/build/cjs/vexflow.js',
            'https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js',
            'https://cdn.jsdelivr.net/npm/vexflow@3.0.9/releases/vexflow-min.js',
            'https://unpkg.com/vexflow@3.0.9/releases/vexflow-min.js'
        ];

        function loadVexFlowFromCDN(index) {
            if (index >= vexFlowCDNs.length) {
                document.getElementById('loadingMsg').style.display = 'none';
                document.getElementById('errorMsg').style.display = 'block';
                document.getElementById('errorMsg').textContent = 'VexFlow 라이브러리를 로드할 수 없습니다. 인터넷 연결을 확인 후 새로고침하세요.';
                return;
            }

            const script = document.createElement('script');
            script.src = vexFlowCDNs[index];
            script.onload = function() {
                console.log('VexFlow 로드 성공:', vexFlowCDNs[index]);
                if (typeof VexFlow !== 'undefined' && typeof Vex === 'undefined') {
                    window.Vex = { Flow: VexFlow };
                }
                initializePage();
            };
            script.onerror = function() {
                console.warn('VexFlow 로드 실패:', vexFlowCDNs[index]);
                loadVexFlowFromCDN(index + 1);
            };
            document.body.appendChild(script);
        }

        loadVexFlowFromCDN(0);
    </script>
</body>
</html>
